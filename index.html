        '</div>' +
        '<div class="ch-appbar">'+appBtns+'</div>';

      if (!d && roasInflight[roasKey()]) { container.innerHTML = header + '<div class="loading">Loading ROAS…</div>'; return; }
      if (roasError && !d) { container.innerHTML = header + '<div class="empty-state"><h2>Couldn’t load ROAS</h2><p>'+roasError+'</p></div>'; return; }
      if (!d) { container.innerHTML = header + '<div class="loading">Loading ROAS…</div>'; return; }

      // range filter on raw rows by cohort age, then aggregate (default 13w hides noisy trial-era)
      let rrows = (d.rows||[]);
      if (roasRange > 0) rrows = rrows.filter(r => r.ageDays <= roasRange);
      const buckets = roasAggregate(rrows, roasGran);        // observed milestones, newest first
      const projByKey = roasProjByBucket(roasGran);          // projection inputs, aligned by key

      // totals (over the selected range)
      let totalSpend = 0, totalProceeds = 0;
      rrows.forEach(r => { if (r.spend != null) { totalSpend += r.spend; totalProceeds += r.proceeds; } });
      const blended = totalSpend > 0 ? (totalProceeds/totalSpend)*100 : null;

      const tiles =
        '<div class="pf-metrics" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0">' +
          '<div class="pf-metric" style="background:#161616;border:1px solid #232323;border-radius:12px;padding:14px 16px">' +
            '<div class="pf-m-label">Spend ('+(roasRange===0?"all time":"last "+roasRange+"d")+')</div><div class="pf-m-value" style="font-size:26px">'+fmtMoney(totalSpend)+'</div></div>' +
          '<div class="pf-metric" style="background:#161616;border:1px solid #232323;border-radius:12px;padding:14px 16px">' +
            '<div class="pf-m-label">Proceeds to date</div><div class="pf-m-value" style="font-size:26px">'+fmtMoney(totalProceeds)+'</div></div>' +
          '<div class="pf-metric" style="background:#161616;border:1px solid #232323;border-radius:12px;padding:14px 16px">' +
            '<div class="pf-m-label">Blended ROAS now</div><div class="pf-m-value" style="font-size:26px;color:'+(blended==null?"#fff":roasColor(blended))+'">'+(blended==null?"—":Math.round(blended)+"%")+'</div></div>' +
        '</div>';

      // ---- chart: cohorts oldest→newest (left→right) ----
      const chart = roasChart(buckets, projByKey);

      // ---- table with per-Dx cols + projection + expand cards ----
      const periodCol = roasGran === "month" ? "Month" : roasGran === "week" ? "Week" : "Install day";
      const rowsHtml = buckets.map(b => {
        const p = projByKey.get(b.key);
        const pRoas = p && p.hasSpend && p.spend>0 ? p.proj1y/p.spend*100 : null;
        const pLow  = p && p.hasSpend && p.spend>0 ? p.projLow/p.spend*100 : null;
        const pHigh = p && p.hasSpend && p.spend>0 ? p.projHigh/p.spend*100 : null;
        const sel = b.key===roasSelected;
        let tr = '<tr class="rc-cohort'+(sel?' sel':'')+'" onclick="selectRoasCohort(\''+b.key+'\')">'+
          '<td class="pf-t-app"><span class="rc-chev">›</span> '+b.label+'</td>'+
          (b.hasSpend?'<td class="pf-t-num r">'+fmtMoney(b.pLife)+'</td>':'<td class="pf-t-num r dim">—</td>')+
          (b.hasSpend?'<td class="pf-t-num r">'+fmtMoney(b.spend)+'</td>':'<td class="pf-t-num r dim">—</td>')+
          roasCell(b.now,true)+
          '<td class="pf-t-num r" style="color:'+(pRoas==null?"":roasColor(pRoas))+';font-weight:600">'+
            (pRoas==null?'<span class="dim">—</span>':Math.round(pRoas)+'%')+
            (pLow!=null?'<div class="pf-band">'+Math.round(pLow)+'–'+Math.round(pHigh)+'%</div>':'')+
          '</td></tr>';
        if (sel) tr += '<tr class="rc-detail"><td colspan="5">'+roasDetailCard(b, p)+'</td></tr>';
        return tr;
      }).join("");
      const table = '<div class="pf-apps"><table class="pf-table"><thead><tr>' +
        '<th>'+periodCol+'</th><th class="r">Proceeds</th><th class="r">Spend</th>'+
        '<th class="r">ROAS now</th><th class="r">1Y pROAS<div class="pf-band" style="font-weight:400">base · worst–best</div></th>' +
        '</tr></thead><tbody>'+rowsHtml+'</tbody></table>' +
        '<div class="ch-foot">Solid = observed ROAS (net of store cut ÷ ad spend), dashed = projected. Install-day cohorts, '+(d.tz||"account")+' time. Click a row for the projection breakdown. 1Y pROAS band flexes billing-failure, weekly renewal &amp; annual auto-renew-off intent.</div></div>';

      container.innerHTML = header + tiles + chart + table;
      roasWireHover(buckets, projByKey);
    }

    // ================= Retention (subscription survival cohorts) =================
    // Reads Firestore retention_cohorts/{appId}__{plan} (precomputed daily, like churn/roas).
    // Mirror of the ROAS tab: x-axis = install cohorts (day/week/month), one line per WEEK-AGE
    // milestone (W1..W12), y = % of cohort still paying by that week. Weekly uses recovery-aware
    // survival (billing failure churns immediately, a later paid renewal recovers it); annual uses
    // "auto-renew still on" (UNSUBSCRIBE = the leading cancel-intent signal), since no annual cohort
    // has matured to its 1-yr renewal yet. Per-cohort table shows the recovered / in-billing-issue /
    // voluntary-unsub / expired breakdown.
    const RETENTION_APPS = [["32830","GirlWalk"]]; // GirlWalk only for now (matches backend RETENTION_APPS)
    // week-age lines, colored on the same ramp as ROAS_DX so the two charts feel identical.
    const RETENTION_MS = [
      { d:7,  k:"W1",  c:"#60a5fa" }, { d:14, k:"W2",  c:"#34d399" },
      { d:21, k:"W3",  c:"#22d3ee" }, { d:28, k:"W4",  c:"#fbbf24" },
      { d:42, k:"W6",  c:"#f472b6" }, { d:56, k:"W8",  c:"#a78bfa" },
      { d:70, k:"W10", c:"#fb923c" }, { d:84, k:"W12", c:"#f87171" },
    ];
    const retDxOn = { W1:true, W2:true, W3:true, W4:true, W6:false, W8:false, W10:false, W12:true };
    const RETENTION_PLANS = [["all","All"],["weekly","Weekly"],["annual","Annual"]];
    const RETENTION_RANGES = [30, 60, 90, 180, 0]; // 0 = All (matches ROAS ranges)
    let retApp = "32830";
    let retPlan = "all";
    let retRange = 90;
    let retGran = "week"; // day | week | month — week reads best, like ROAS
    let retData = {};      // "appId__plan" → payload
    let retInflight = {};  // "appId__plan" → true while loading
    let retError = null;
    let retSelected = null; // cohort bucket key expanded in the table + highlighted on chart
    function retKey() { return retApp + "__" + retPlan; }
    window.setRetApp = function(id) { retApp = id; retSelected=null; renderRetention(); loadRetention(); };
    window.setRetPlan = function(p) { retPlan = p; retSelected=null; renderRetention(); loadRetention(); };
    window.setRetRange = function(w) { retRange = w; renderRetention(); };
    window.setRetGran = function(g) { retGran = g; retSelected=null; renderRetention(); };
    window.toggleRetDx = function(k) { retDxOn[k] = !retDxOn[k]; renderRetention(); };
    window.selectRetCohort = function(key) { retSelected = retSelected===key ? null : key; renderRetention(); };

    async function loadRetention() {
      const key = retKey();
      if (retInflight[key]) return;   // always refetch on view; guard only concurrent loads
      retInflight[key] = true; retError = null;
      try {
        const snap = await getDoc(doc(db, "retention_cohorts", retApp + "__" + retPlan));
        if (!snap.exists()) throw new Error("no data yet for this app/plan");
        retData[key] = JSON.parse(snap.data().payload);
      } catch (e) {
        console.warn("retention load failed", e);
        retError = e.message;
      } finally {
        delete retInflight[key];
        if (section === "retention") renderRetention();
      }
    }

    // retention % color: survival is GOOD high, so invert the ROAS ramp —
    // green when high, amber mid, red low. null -> "".
    function retColor(pct) {
      if (pct == null) return "";
      if (pct >= 40) return "#4ade80";
      if (pct >= 20) return "#fbbf24";
      return "#f87171";
    }

    // Aggregate raw per-cohort-DAY rows into buckets (day/week/month) using the SAME
    // bucket keying as ROAS (roasBucket), so the x-axis reads identically. Each bucket
    // sums, per milestone, `ret` (subs still paying at week m) and `base` (subs old
    // enough to have reached week m). retention % = ret/size (see rx below) — full-cohort
    // denominator, shown only once the WHOLE bucket has matured past m, so young cohorts
    // don't show a distorted deep-week point. Mirrors ROAS's maturity gate.
    function retAggregate(rows, gran) {
      const buckets = new Map();
      for (const r of rows) {
        const b = roasBucket(r.day, gran);
        let a = buckets.get(b.key);
        if (!a) { a = { key:b.key, label:b.label, size:0, minAge:Infinity, cohortStart:r.day,
          ret:{}, base:{}, recovered:0, billing_now:0, unsub:0, expired:0 };
          RETENTION_MS.forEach(m => { a.ret[m.d]=0; a.base[m.d]=0; });
          buckets.set(b.key, a); }
        a.size += r.size;
        a.minAge = Math.min(a.minAge, r.ageDays);
        if (r.day < a.cohortStart) a.cohortStart = r.day;
        a.recovered += r.recovered||0; a.billing_now += r.billing_now||0;
        a.unsub += r.unsub||0; a.expired += r.expired||0;
        RETENTION_MS.forEach(m => {
          const s = r.surv && r.surv[m.d];
          if (s) { a.ret[m.d] += s.retained||0; a.base[m.d] += s.base||0; }
        });
      }
      const out = [...buckets.values()];
      out.sort((x,y) => x.key < y.key ? 1 : -1); // newest first
      for (const a of out) {
        // retention % at milestone m = (subs still paying at week m) / (WHOLE cohort).
        // Denominator is ALWAYS the full cohort size (constant across milestones), so the
        // curve is a true survival curve and stays monotone (deeper m → fewer chage>m
        // survivors ÷ same size). Gate purely on COHORT AGE: show milestone m once the whole
        // bucket has aged past m days (minAge >= m), exactly like the ROAS tab gates its Dx.
        // We deliberately DON'T require every sub's paid-age >= m (the old base===size gate):
        // a few subs first-pay late (late trial conversion), so base[m] can sit just under
        // size for a clearly-mature week — that blanked the whole week and broke the line.
        // A late-payer simply isn't counted as retained at week m (not in ret[m]) — correct.
        a.rx = (m) => {
          if (a.minAge < m) return null;      // bucket not old enough to observe week m yet
          if (a.size <= 0) return null;
          return (a.ret[m] / a.size) * 100;   // survivors / full cohort
        };
        // "current" survival for the table = retention at the LARGEST milestone the whole
        // bucket has matured past (deepest observed point on its curve). null if none yet.
        let cur = null, curK = null;
        for (const m of RETENTION_MS) { const v = a.rx(m.d); if (v!=null) { cur=v; curK=m.k; } }
        a.cur = cur; a.curK = curK;
      }
      return out;
    }

    let retChartGeom = null; // stashed for hover
    function retChart(bucketsNewestFirst) {
      const B = [...bucketsNewestFirst].reverse(); // oldest → newest, left → right
      if (!B.length) return '<div class="pf-chart-wrap"><div class="loading">No cohorts</div></div>';
      const W=1140,H=360,PADL=44,PADR=16,PADT=14,PADB=32;
      const series = RETENTION_MS.map(m => ({ m, pts: B.map((b,i)=>({ i, v: b.rx(m.d) })) }));
      // y-axis is % survival: fixed 0..100 so cohorts are comparable and the axis never jumps.
      const ymax = 100;
      const X = i => PADL + (B.length>1 ? i*((W-PADL-PADR)/(B.length-1)) : (W-PADL-PADR)/2);
      const Y = v => PADT + (1 - v/ymax)*(H-PADT-PADB);
      retChartGeom = { B, X, W, PADL, PADR, PADT, PADB, H };

      let grid='',axis='';
      for(let g=0; g<=100; g+=20){ const yy=Y(g); grid+='<line x1="'+PADL+'" y1="'+yy+'" x2="'+(W-PADR)+'" y2="'+yy+'"/>'; axis+='<text class="rc-ax" x="'+(PADL-8)+'" y="'+(yy+3)+'" text-anchor="end">'+g+'%</text>'; }
      let xlab=''; B.forEach((b,i)=>{ if(i%Math.ceil(B.length/7)===0||i===B.length-1) xlab+='<text class="rc-ax" x="'+X(i)+'" y="'+(H-PADB+16)+'" text-anchor="middle">'+b.label.replace(/^Week of /,'')+'</text>'; });

      let lines='',dots='';
      series.forEach(s=>{ if(!retDxOn[s.m.k])return; const col=s.m.c;
        let solid='',prev=null;
        s.pts.forEach(p=>{ if(p.v==null){prev=null;return;} const cur={x:X(p.i),y:Y(p.v)};
          if(prev) solid+='M'+prev.x+','+prev.y+' L'+cur.x+','+cur.y+' ';
          prev=cur;
          dots+='<circle cx="'+cur.x+'" cy="'+cur.y+'" r="2.6" fill="'+col+'" stroke="'+col+'" stroke-width="1.4"/>';
        });
        lines+='<path class="rc-curve" d="'+solid+'" stroke="'+col+'"/>';
      });
      let selLine='';
      if(retSelected!=null){ const i=B.findIndex(b=>b.key===retSelected); if(i>=0) selLine='<line class="rc-sel" x1="'+X(i)+'" y1="'+PADT+'" x2="'+X(i)+'" y2="'+(H-PADB)+'"/>'; }
      let hot=''; B.forEach((b,i)=>{ const w=(W-PADL-PADR)/Math.max(1,B.length-1); hot+='<rect x="'+(X(i)-w/2)+'" y="'+PADT+'" width="'+w+'" height="'+(H-PADT-PADB)+'" fill="transparent" data-i="'+i+'"/>'; });

      const legend = '<div class="rc-legend">'+RETENTION_MS.map(m=>'<span class="rc-lg '+(retDxOn[m.k]?"on":"off")+'" onclick="toggleRetDx(\''+m.k+'\')"><span class="sw" style="background:'+m.c+'"></span>'+m.k+'</span>').join('')+'</div>';
      const cap = retPlan==="annual"
        ? 'Auto-renew still on by week N, across cohorts'
        : 'Subscription survival by week N, across cohorts';
      return '<div class="pf-chart-wrap" id="retChartWrap">'+
        '<div class="rc-top"><div class="rc-cap">'+cap+'</div>'+legend+'</div>'+
        '<svg viewBox="0 0 '+W+' '+H+'"><g class="rc-grid">'+grid+'</g>'+axis+xlab+selLine+lines+dots+hot+'</svg>'+
        '<div class="pf-tip" id="retTip"></div></div>';
    }

    function retWireHover(bucketsNewestFirst) {
      const wrap=document.getElementById("retChartWrap"); if(!wrap||!retChartGeom) return;
      const tip=document.getElementById("retTip"); const {B}=retChartGeom;
      wrap.querySelectorAll('rect[data-i]').forEach(rect=>{
        rect.addEventListener('mousemove', (e)=>{
          const b=B[+rect.dataset.i];
          const rows = RETENTION_MS.filter(m=>retDxOn[m.k]).map(m=>{
            const v=b.rx(m.d); if(v==null) return '';
            return '<div class="t-row"><span class="t-sw" style="background:'+m.c+'"></span>'+m.k+'<span class="t-val">'+Math.round(v)+'% <span style="color:#666;font-size:9.5px">('+b.ret[m.d]+'/'+b.size+')</span></span></div>';
          }).join('');
          tip.innerHTML='<div class="t-date">'+b.label+' · '+b.size+' subs</div>'+(rows||'<div class="t-row" style="color:#666">too young — no matured week yet</div>');
          const wr=wrap.getBoundingClientRect();
          tip.style.left=(e.clientX-wr.left)+'px'; tip.style.top=(e.clientY-wr.top-8)+'px'; tip.style.opacity=1;
        });
        rect.addEventListener('mouseleave', ()=>{ tip.style.opacity=0; });
      });
    }

    function renderRetention() {
      const container = document.getElementById("container");
      const appBtns = RETENTION_APPS.map(([id,name]) =>
        '<button class="filter-btn '+(id===retApp?"active":"")+'" onclick="setRetApp(\''+id+'\')">'+name+'</button>'
      ).join("");
      const planBtns = RETENTION_PLANS.map(([pk,name]) =>
        '<button class="filter-btn '+(pk===retPlan?"active":"")+'" onclick="setRetPlan(\''+pk+'\')">'+name+'</button>'
      ).join("");
      const granBtns = [["day","Day"],["week","Week"],["month","Month"]].map(([g,name]) =>
        '<button class="pf-range-btn '+(g===retGran?"active":"")+'" onclick="setRetGran(\''+g+'\')">'+name+'</button>'
      ).join("");
      const rangeBtns = [[30,"Last 30 days"],[90,"Last 90 days"],[180,"Last 180 days"],[0,"All time"]].map(([w,name]) =>
        '<button class="pf-range-btn '+(w===retRange?"active":"")+'" onclick="setRetRange('+w+')">'+name+'</button>'
      ).join("");
      const d = retData[retKey()];
      const synced = d && d.generatedAt ? new Date(d.generatedAt).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "";
      const header =
        '<div class="pf-head">' +
          '<div><div class="pf-m-label">Retention</div>' +
            (synced?'<div class="ch-sub">Synced '+synced+'</div>':'')+'</div>' +
          '<div class="ch-filters">' +
            '<div class="pf-ranges">'+granBtns+'</div>' +
            '<div class="pf-ranges">'+rangeBtns+'</div>' +
          '</div>' +
        '</div>' +
        '<div class="ch-appbar">'+appBtns+'</div>' +
        '<div class="ch-appbar" style="margin-top:8px">'+planBtns+'</div>';

      if (!d && retInflight[retKey()]) { container.innerHTML = header + '<div class="loading">Loading retention…</div>'; return; }
      if (retError && !d) { container.innerHTML = header + '<div class="empty-state"><h2>Couldn’t load retention</h2><p>'+retError+'</p></div>'; return; }
      if (!d) { container.innerHTML = header + '<div class="loading">Loading retention…</div>'; return; }

      let rrows = (d.rows||[]);
      if (retRange > 0) rrows = rrows.filter(r => r.ageDays <= retRange);
      const buckets = retAggregate(rrows, retGran);

      // totals across the selected range (for the summary tiles)
      let totSubs=0, totRecovered=0, totBilling=0, totUnsub=0, totExpired=0;
      rrows.forEach(r => { totSubs+=r.size||0; totRecovered+=r.recovered||0; totBilling+=r.billing_now||0; totUnsub+=r.unsub||0; totExpired+=r.expired||0; });

      // tiles adapt to plan: weekly cares about recovered/billing; annual about cancel-intent.
      const tile = (label,val,color) =>
        '<div class="pf-metric" style="background:#161616;border:1px solid #232323;border-radius:12px;padding:14px 16px">' +
          '<div class="pf-m-label">'+label+'</div><div class="pf-m-value" style="font-size:26px'+(color?';color:'+color:'')+'">'+val+'</div></div>';
      let tilesInner = tile("Subs ("+(retRange===0?"all time":"last "+retRange+"d")+")", totSubs.toLocaleString("en-US"));
      if (retPlan === "annual") {
        tilesInner += tile("Voluntary unsubs", totUnsub.toLocaleString("en-US"), totUnsub>0?"#fb923c":"");
        tilesInner += tile("Still auto-renew on", (totSubs-totUnsub).toLocaleString("en-US"), "#4ade80");
      } else {
        tilesInner += tile("Recovered (weekly)", totRecovered.toLocaleString("en-US"), totRecovered>0?"#4ade80":"");
        tilesInner += tile("In billing issue", totBilling.toLocaleString("en-US"), totBilling>0?"#f87171":"");
        tilesInner += tile("Voluntary unsubs", totUnsub.toLocaleString("en-US"), totUnsub>0?"#fb923c":"");
      }
      const nTiles = retPlan==="annual" ? 3 : 4;
      const tiles = '<div class="pf-metrics" style="display:grid;grid-template-columns:repeat('+nTiles+',1fr);gap:12px;margin:14px 0">'+tilesInner+'</div>';

      const chart = retChart(buckets);

      // per-cohort table: size · current survival · recovered · in-billing · voluntary unsub · expired
      const periodCol = retGran === "month" ? "Month" : retGran === "week" ? "Week" : "Install day";
      const isAnnual = retPlan === "annual";

    // ================= projection model (feeds the merged ROAS tab) =================
    // Consumes proas_cohorts docs (install-day cohorts, plan split + sub counts + churn signals).
    // The merged ROAS tab loads these via loadRoas() and uses the functions below (proasProjectDay,
    // proasCumToAge) to draw the projected (dashed) Dx lines and the per-cohort projection card.
    // Model is client-side so it can be tuned without redeploying. Projects each cohort's revenue to
    // 1 year: observed proceeds + weekly renewal tail (survival curve) + annual renewal (auto-renew
    // -off intent × billing discount). Observed ROAS == ROAS tab (same net proceeds).
    // --- projection model (from the pROAS analysis; GirlWalk-calibrated) ---
    const WK_SURVIVAL = [1.000,0.554,0.401,0.323,0.248,0.222,0.196,0.166,0.135,0.118,0.100,0.096,
      0.092,0.092,0.092,0.092,0.092,0.084,0.075,0.067,0.059,0.057,0.055,0.053,0.051,0.049,0.047,0.045,
      0.043,0.042,0.041,0.040,0.039,0.038,0.037,0.036,0.035,0.034,0.033,0.032,0.031,0.030,0.029,0.028,
      0.028,0.028,0.028,0.028,0.028,0.028,0.028,0.028,0.028];
    const WK_HORIZON = 52; // expected weekly-renewal proceeds now comes per-app/geo from the backend
    const ANNUAL_UNSUB = (()=>{ const real={0:.662,1:.683,2:.710,4:.736,6:.763,8:.762,12:.782,16:.820,20:.894};
      const a=[]; const ks=Object.keys(real).map(Number);
      for(let w=0;w<=52;w++){ if(real[w]!=null){a[w]=real[w];continue;}
        if(w<20){const lo=Math.max(...ks.filter(k=>k<w)),hi=Math.min(...ks.filter(k=>k>w));a[w]=real[lo]+(real[hi]-real[lo])*(w-lo)/(hi-lo);}
        else a[w]=a[w-1]+(0.95-a[w-1])*0.04; } return a; })();
    const ANNUAL_UNSUB_WK52 = ANNUAL_UNSUB[52];

    // Scenario band. Each scenario flexes the two biggest unknowns — annual billing-failure
    // rate and how much weekly renewal / annual auto-renew-off intent lands. base == the single
    // point estimate; low/high widen it into a worst/best fan (no annual cohort has reached its
    // 1-yr renewal yet, so the annual piece is modeled, not observed — the band is honest about it).
    const PROAS_SCEN = {
      low:  { billing: 0.30, weeklyMult: 0.85, annualStretch: 1.10 },
      base: { billing: 0.20, weeklyMult: 1.00, annualStretch: 1.00 },
      high: { billing: 0.12, weeklyMult: 1.15, annualStretch: 0.92 },
    };

    // Project ONE cohort-day (never a mixed-age bucket) to a 1-year value, for one scenario.
    // Each day has its own age, so its own survival anchor — this is what fixes the mixed-age
    // bucket bug (aggregating first then projecting off the youngest day mis-ages the tail).
    function proasProjectDay(r, scenKey, wkProceeds){
      const s = PROAS_SCEN[scenKey];
      const weekly_p = r.weekly_p||0, annual_p = r.annual_p||0;
      const ageWk = Math.max(0, Math.round((r.ageDays||0)/7));
      const sNow = WK_SURVIVAL[Math.min(ageWk, WK_HORIZON)] || 0.028;

      // (C) Per-cohort retention lift: this day's observed alive-share vs the curve-expected
      // survival at its age. Holds better than curve -> lift>1 (bend forward survival up); worse
      // -> lift<1. Clamped because small daily cohorts are noisy.
      let lift = 1.0;
      if (r.weekly_subs>0 && ageWk>=1 && sNow>0){
        const aliveShare = (r.weekly_alive||0)/r.weekly_subs;
        lift = Math.max(0.6, Math.min(1.6, aliveShare/sNow));
      }

      let proj = weekly_p + annual_p; // observed proceeds already banked
      // weekly renewal tail: alive-now × expected net proceeds/renewal × conditional forward
      // survival, bent by lift, scenario-scaled. Price uses THIS cohort's own observed weekly-renewal
      // $ (r.wk_price) — we run several weekly plans at different prices, so a cohort's future
      // renewals must be priced from the plan it actually bought. Cohorts with no weekly renewal
      // yet (wk_price 0) fall back to the app mean (wkProceeds). If neither exists, skip the tail.
      const price = (r.wk_price>0 ? r.wk_price : (wkProceeds>0 ? wkProceeds : 0));
      if ((r.weekly_alive||0)>0 && sNow>0 && price>0){
        let tail = 0;
        for(let w=ageWk+1; w<=WK_HORIZON; w++){
          const fFwd = Math.pow(Math.min(1,(WK_SURVIVAL[w]||0)/sNow), 1/lift);
          tail += r.weekly_alive * price * fFwd;
        }
        proj += tail * s.weeklyMult;
      }
      // annual renewal @ wk52: (1 - projected unsub@52) × (1 - billing), intent anchor-scaled on observed
      // Auto-renew-off intent front-loads at D0 (installers often kill renewal right after buying —
      // the pooled curve is already 66% unsub at wk0), so anchor on the cohort's OWN observed intent
      // from day 0, no age gate. No count gate either: thin days are bounded by the ratio clamp below,
      // and the per-day projections are summed, so noise averages out at the bucket level.
      const aw = Math.min(52, Math.max(0, ageWk));
      const obsUnsub = r.annual_subs>0 ? 1 - ((r.annual_on||0)/r.annual_subs) : null;
      const pooledNow = ANNUAL_UNSUB[aw] || ANNUAL_UNSUB_WK52;
      let ratio = 1.0;
      if (obsUnsub != null && pooledNow>0) ratio = Math.max(0.70, Math.min(1.1, obsUnsub/pooledNow));
      const unsub52 = Math.min(0.97, ANNUAL_UNSUB_WK52 * ratio * s.annualStretch);
      const annualRate = Math.max(0, (1-unsub52)*(1-s.billing));
      const annualRenew = annual_p * annualRate;
      proj += annualRenew;

      return { proj, actual: weekly_p+annual_p, annualRenew, annualRate, lift };
    }

    // Projected CUMULATIVE proceeds for one cohort-day up to targetAgeDays (base scenario). Used to
    // build the chart's projected Dx points (D30/D60/D90/D180/D365) — same model as proasProjectDay
    // but the weekly tail is only summed through the target age, and the annual renewal (a wk52 lump)
    // is only included once the target reaches ~1 year. Returns cumulative net proceeds by that age.
    function proasCumToAge(r, wkProceeds, targetAgeDays){
      const weekly_p = r.weekly_p||0, annual_p = r.annual_p||0;
      const ageWk = Math.max(0, Math.round((r.ageDays||0)/7));
      const targetWk = Math.min(WK_HORIZON, Math.round(targetAgeDays/7));
      const sNow = WK_SURVIVAL[Math.min(ageWk, WK_HORIZON)] || 0.028;
      let lift = 1.0;
      if (r.weekly_subs>0 && ageWk>=1 && sNow>0){
        const aliveShare = (r.weekly_alive||0)/r.weekly_subs;
        lift = Math.max(0.6, Math.min(1.6, aliveShare/sNow));
      }
      let cum = weekly_p + annual_p; // banked so far
      // weekly tail only for future weeks up to the target age
      const price = (r.wk_price>0 ? r.wk_price : (wkProceeds>0 ? wkProceeds : 0));
      if ((r.weekly_alive||0)>0 && sNow>0 && price>0 && targetWk>ageWk){
        for(let w=ageWk+1; w<=targetWk; w++){
          const fFwd = Math.pow(Math.min(1,(WK_SURVIVAL[w]||0)/sNow), 1/lift);
          cum += r.weekly_alive * price * fFwd;
        }
      }
      // annual renewal only lands at ~1 year
      if (targetAgeDays >= 364){
        const aw = Math.min(52, Math.max(0, ageWk));
        const obsUnsub = r.annual_subs>0 ? 1 - ((r.annual_on||0)/r.annual_subs) : null;
        const pooledNow = ANNUAL_UNSUB[aw] || ANNUAL_UNSUB_WK52;
        let ratio = 1.0;
        if (obsUnsub != null && pooledNow>0) ratio = Math.max(0.70, Math.min(1.1, obsUnsub/pooledNow));
        const unsub52 = Math.min(0.97, ANNUAL_UNSUB_WK52 * ratio);
        cum += annual_p * Math.max(0, (1-unsub52)*(1-0.20));
      }
      return cum;
    }

    function timeAgo(date) {
      const now = new Date(); const diff = (now - date) / 1000;
      if (diff < 60) return Math.floor(diff) + "s";
      if (diff < 3600) return Math.floor(diff / 60) + "m";
      if (diff < 86400) return Math.floor(diff / 3600) + "h";
      return Math.floor(diff / 86400) + "d";
    }
    function formatTime(date) {
      return date.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
    }
    function formatCurrency(price) {
      try { return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 }).format(price); }
      catch { return "$" + Number(price).toFixed(2); }
    }
    function formatCurrencyCompact(price) {
      const abs = Math.abs(price);
      if (abs >= 1000) return (price < 0 ? "-" : "") + "$" + (abs / 1000).toFixed(abs >= 10000 ? 0 : 1) + "k";
      try { return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(price); }
      catch { return "$" + Math.round(price); }
    }
    function countryToFlag(code) {
      if (!code || code.length !== 2) return "";
      const codePoints = code.toUpperCase().split("").map(c => 127397 + c.charCodeAt(0));
      return String.fromCodePoint(...codePoints);
    }
    function getTxDate(tx) {
      if (tx.received_at?.toDate) return tx.received_at.toDate();
      if (tx.purchased_at_ms) return new Date(tx.purchased_at_ms);
      return new Date(tx.event_timestamp_ms || 0);
    }
    function getDayKey(date) {
      const d = new Date(date); d.setHours(0, 0, 0, 0); return d.getTime();
    }
    function getDayLabel(ts) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      if (ts === today.getTime()) return "Today";
      if (ts === yesterday.getTime()) return "Yesterday";
      return new Date(ts).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
    }
    function summarize(txs) {
      let net = 0, convCount = 0, renewCount = 0, refundCount = 0, refundAbs = 0;
      for (const t of txs) {
        const p = t.price || 0;
        net += p;
        if (t.transaction_type === "renewal") renewCount++;
        else if (t.transaction_type === "refund") { refundCount++; refundAbs += Math.abs(p); }
        else if (CONVERSION_TYPES.has(t.transaction_type)) convCount++;
      }
      return { net, convCount, renewCount, refundCount, refundAbs, total: txs.length };
    }

    function formatPct(v, decimals) {
      if (v === null || v === undefined || Number.isNaN(v)) return "—";
      return Number(v).toFixed(decimals != null ? decimals : 1) + "%";
    }
    function deltaPct(today, yest) {
      if (today == null || yest == null || yest === 0) return null;
      return ((today - yest) / yest) * 100;
    }

    // KPI strip — uses all available txs (not just filtered to today)
    function renderKpis() {
      const now = new Date();
      const today0 = new Date(now); today0.setHours(0, 0, 0, 0);
      const yest0 = new Date(today0); yest0.setDate(yest0.getDate() - 1);
      const mtd0 = new Date(now.getFullYear(), now.getMonth(), 1); mtd0.setHours(0, 0, 0, 0);
      const week0 = new Date(today0); week0.setDate(week0.getDate() - 6); // last 7 days incl today

      const txs = currentApp === "all" ? allTxs : allTxs.filter(t => t.app_name === currentApp);

      let todayNet = 0, todayCount = 0;
      let yestNet = 0;
      let mtdNet = 0;
      let weekConv = 0, weekTrials = 0;  // for trial→paid %
      let weekRevenue = 0, weekRefunds = 0;

      for (const t of txs) {
        const d = getTxDate(t);
        const p = t.price || 0;
        const tt = t.transaction_type;
        if (d >= mtd0) mtdNet += p;
        if (d >= today0) { todayNet += p; todayCount++; }
        else if (d >= yest0 && d < today0) yestNet += p;
        if (d >= week0) {
          if (p > 0) weekRevenue += p;
          if (tt === "refund") weekRefunds += Math.abs(p);
          if (tt === "trial_to_paid") weekConv++;
          // trial starts aren't in dataset (we skip them), so trial→paid % approximated as conv / (conv+expirations). Skip for now.
        }
      }

      // Yesterday-at-this-time comparison (more useful than full-yesterday)
      const yestSameTime = new Date(now); yestSameTime.setDate(yestSameTime.getDate() - 1);
      const yestStart = new Date(yest0);
      let yestToNow = 0;
      for (const t of txs) {
        const d = getTxDate(t);
        if (d >= yestStart && d <= yestSameTime) yestToNow += (t.price || 0);
      }
      const delta = yestToNow > 0 ? ((todayNet - yestToNow) / yestToNow) * 100 : null;
      const refundRate = weekRevenue > 0 ? (weekRefunds / weekRevenue) * 100 : 0;

      const kpi = (label, value, sub, subClass) =>
        '<div class="kpi"><div class="k-label">' + label + '</div>' +
        '<div class="k-value">' + value + '</div>' +
        (sub ? '<div class="k-sub ' + (subClass || '') + '">' + sub + '</div>' : '') + '</div>';

      const primary = '<div class="kpi primary"><div class="k-label">Today</div>' +
        '<div class="k-value">' + formatCurrency(todayNet) + '</div>' +
        '<div class="k-sub">' + todayCount + ' event' + (todayCount !== 1 ? 's' : '') + '</div></div>';

      const vsYest = delta !== null
        ? (delta >= 0 ? '↑ ' : '↓ ') + Math.abs(delta).toFixed(0) + '% vs yest'
        : 'no data yest';
      const vsYestClass = delta === null ? '' : (delta >= 0 ? 'up' : 'down');

      // Superwall KPIs override (5 cards). Falls back to legacy 3 cards if not loaded yet.
      if (swStats && swStats.today) {
        const t = swStats.today, y = swStats.yest || {};
        // For trial-cohort KPIs, "today" actually means today - 3 (cohort lag). Note in subtitle.
        const lag = swStats.trialLagDays || 3;
        function kpiPair(label, todayVal, yestVal, fmt, extra) {
          const dPct = deltaPct(todayVal, yestVal);
          // Direction interpretation: for negative-signal metrics (cancel/billing), down is good
          const negSignal = (label === "Cancellation %" || label === "Billing issue rate");
          const yestStr = yestVal != null && !Number.isNaN(yestVal) ? "y: " + fmt(yestVal) : "y: —";
          const deltaStr = dPct != null
            ? (dPct >= 0 ? " ↑" : " ↓") + Math.abs(dPct).toFixed(0) + "%"
            : "";
          let subClass = "";
          if (dPct != null) {
            const isUp = dPct >= 0;
            subClass = negSignal ? (isUp ? "down" : "up") : (isUp ? "up" : "down");
          }
          const titleAttr = extra ? ' title="' + extra + '"' : '';
          return '<div class="kpi"' + titleAttr + '><div class="k-label">' + label + '</div>' +
            '<div class="k-value">' + fmt(todayVal) + '</div>' +
            '<div class="k-sub ' + subClass + '">' + yestStr + deltaStr + '</div></div>';
        }
        const pct = v => formatPct(v, 1);
        const tc = t.counts || {}, yc = y.counts || {};
        const itpLag = swStats.itpLagDays || 4;
        return '<div class="kpis kpis-2">' +
          kpiPair("Paywall rate", t.paywallRate, y.paywallRate, pct,
            "paywalled_users / new_users (today)\n" + tc.paywalled_users + "/" + tc.new_users) +
          kpiPair("Install to Paid %", t.itpRate, y.itpRate, pct,
            "paid_users / new_users (install cohort " + itpLag + "d ago)\n" + tc.itp_paid_users + "/" + tc.itp_new_users) +
        '</div>';
      }

      // Fallback (during initial load before swStats arrives)
      const loadingNote = swStatsLoading ? '<div class="k-sub">loading…</div>' : '';
      return '<div class="kpis">' +
        primary +
        kpi("vs Yesterday", formatCurrencyCompact(yestToNow), vsYest, vsYestClass) +
        '<div class="kpi"><div class="k-label">Superwall KPIs</div><div class="k-value">…</div>' + loadingNote + '</div>' +
      '</div>';
    }

    function truncateId(id) {
      if (!id) return "";
      return id.length > 24 ? id.slice(-10) : id;
    }

    function renderTx(tx) {
      const type = tx.transaction_type || "unknown";
      const label = labels[type] || type;
      const ts = getTxDate(tx);
      const flag = countryToFlag(tx.country_code);
      const appName = tx.app_name || "Unknown";
      const iconUrl = appIcons[appName];
      const iconHtml = iconUrl
        ? '<img src="' + iconUrl + '" alt="' + appName + '" />'
        : appName.charAt(0);
      const userId = tx.app_user_id || "";
      const idHtml = userId
        ? '<div class="tx-id" onclick="copyTxId(\'' + userId.replace(/'/g, "\\'") + '\', this, event)" title="Click to copy App User ID">' + truncateId(userId) + '</div>'
        : "";
      // Compact info line: trial→paid label (or country flag for renewals where label is redundant)
      const showLabel = type === "trial_to_paid" || type === "new_subscription" || type === "one_time_purchase";
      const subline = (showLabel ? label + ' · ' : '') + (tx.product_id || "—") + (flag ? ' ' + flag : "");
      // Price color by type
      let priceCls = "tx-price";
      if (type === "refund") priceCls += " refund";
      else if (type === "renewal") priceCls += " renewal";
      const cardCls = "tx-card" + (tx.recovered_from_billing ? " recovered" : "");
      // Lifetime-value badge — renewals only, read directly from the doc (eager, stored at webhook).
      let ltvHtml = "";
      if (type === "renewal" && tx.lifetime_spend != null && tx.lifetime_spend > 0) {
        const ltv = Number(tx.lifetime_spend);
        const tier = ltv > 100 ? "tier-whale" : ltv > 50 ? "tier-mid" : "tier-base";
        const icon = ltv > 100 ? "👑 " : ltv > 50 ? "💎 " : "";
        const pays = tx.lifetime_payments != null ? Number(tx.lifetime_payments) + " payments" : "";
        ltvHtml = '<span class="tx-ltv shown ' + tier + '" title="Lifetime: $' + ltv.toFixed(2) + (pays ? ' • ' + pays : '') + '">' +
          icon + '$' + ltv.toFixed(0) + ' LTV</span>';
      }
      const nameLine = '<h3>' + appName + ltvHtml + '</h3>';
      return '<div class="' + cardCls + '" ' + (tx.recovered_from_billing ? 'title="Renewal after billing retry — subscription recovered"' : '') + '>' +
          '<div class="tx-icon">' + iconHtml + '</div>' +
          '<div class="tx-info">' + nameLine + '<p>' + subline + '</p></div>' +
          '<div class="tx-right"><div class="' + priceCls + '">' + formatCurrency(tx.price) + '</div><div class="tx-time">' + formatTime(ts) + ' · ' + timeAgo(ts) + '</div>' + idHtml + '</div>' +
        '</div>';
    }

    function getFilteredTxs() {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let txs = currentApp === "all" ? allTxs : allTxs.filter(t => t.app_name === currentApp);
      if (viewMode === "live") txs = txs.filter(t => getTxDate(t) >= today);
      return txs;
    }

    function renderColumns(txs) {
      const conv = txs.filter(t => CONVERSION_TYPES.has(t.transaction_type));
      const renew = txs.filter(t => t.transaction_type === "renewal");
      const refund = txs.filter(t => t.transaction_type === "refund");

      const colHtml = (cls, title, items) => {
        const sum = items.reduce((s, t) => s + (t.price || 0), 0);
        const body = items.length
          ? items.map(renderTx).join("")
          : '<div class="empty-col">None today</div>';
        return '<div class="col">' +
          '<div class="col-header">' +
            '<span class="col-title ' + cls + '">' + title + '</span>' +
            '<span class="col-totals"><span class="amt">' + formatCurrency(sum) + '</span><span class="cnt">' + items.length + '</span></span>' +
          '</div>' +
          body +
        '</div>';
      };

      // Hide refund column if zero on slow days (saves space)
      const hideRefunds = refund.length === 0;
      const wrap = hideRefunds ? '<div class="columns no-refunds">' : '<div class="columns">';
      return wrap +
        colHtml("conv", "Conversions", conv) +
        colHtml("renew", "Renewals", renew) +
        (hideRefunds ? "" : colHtml("refund", "Refunds", refund)) +
      '</div>';
    }

    function renderDayHeader(label, txs) {
      const s = summarize(txs);
      const parts = [];
      if (s.convCount) parts.push('<span class="b-conv">' + s.convCount + ' conv</span>');
      if (s.renewCount) parts.push('<span class="b-renew">' + s.renewCount + ' renew</span>');
      if (s.refundCount) parts.push('<span class="b-refund">' + s.refundCount + ' refund</span>');
      const breakdown = parts.length ? '<span class="breakdown">' + parts.join("") + '</span>' : "";
      return '<div class="day-header"><span class="day-label">' + label + '</span>' +
        '<span class="day-summary">' + formatCurrency(s.net) + breakdown + '</span></div>';
    }

    function renderAll() {
      if (section !== "activity") return; // Revenue view owns the container; don't clobber it
      const container = document.getElementById("container");
      const filtered = getFilteredTxs();

      if (viewMode === "live") {
        let html = renderKpis();
        if (filtered.length === 0) {
          html += '<div class="empty-state"><h2>No transactions today</h2><p>Switch to History to see past transactions.</p></div>';
        } else {
          html += renderDayHeader("Today", filtered);
          html += renderColumns(filtered);
        }
        container.innerHTML = html;
        return;
      }

      // History
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><h2>No transactions yet</h2><p>Transactions will appear here as they come in.</p></div>';
        return;
      }
      const groups = {};
      const groupOrder = [];
      filtered.forEach(tx => {
        const key = getDayKey(getTxDate(tx));
        if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
        groups[key].push(tx);
      });
      let html = renderKpis();
      groupOrder.forEach(key => {
        html += renderDayHeader(getDayLabel(key), groups[key]);
        html += renderColumns(groups[key]);
      });
      if (lastDoc && allTxs.length >= PAGE_SIZE) {
        html += '<button class="show-more" id="loadMore">Show more</button>';
      }
      container.innerHTML = html;
      const btn = document.getElementById("loadMore");
      if (btn) btn.addEventListener("click", loadMore);
    }

    function updateFilters() {
      allTxs.forEach(t => {
        if (!t.app_name) return;
        // Hide raw Stripe price IDs — backend bundles new ones as "Stripe Web",
        // but legacy docs may still have the raw price_id as app_name.
        if (/^(live:)?price_/.test(t.app_name)) return;
        knownApps.add(t.app_name);
      });
      const filtersEl = document.getElementById("filters");
      const priority = ["GirlTalk","GirlWalk","Poly AI","Christian Daily Task","Christian Daily Tasks","Christian Music","Christian Music AI"];
      const rank = (a) => {
        const i = priority.indexOf(a);
        return i === -1 ? priority.length : i;
      };
      const apps = Array.from(knownApps).sort((a,b) => {
        const ra = rank(a), rb = rank(b);
        if (ra !== rb) return ra - rb;
        return a.localeCompare(b);
      });
      // Guard invalid selection (e.g. an app that dropped out of the window)
      if (currentApp !== "all" && !knownApps.has(currentApp)) currentApp = "all";
      const opts = ['<option value="all"' + (currentApp === "all" ? " selected" : "") + '>All apps</option>']
        .concat(apps.map(a =>
          '<option value="' + a.replace(/"/g, "&quot;") + '"' + (currentApp === a ? " selected" : "") + '>' + a + '</option>'
        )).join("");
      filtersEl.innerHTML = '<select class="app-select" id="appSelect" aria-label="Filter by app">' + opts + '</select>';
      const sel = document.getElementById("appSelect");
      sel.addEventListener("change", () => { currentApp = sel.value; updateFilters(); renderAll(); fetchSwStats(); });
    }

    const VISIBLE_TYPES_ARR = Array.from(VISIBLE_TYPES);

    async function loadMore() {
      if (!lastDoc) return;
      const q = query(collection(db, "transactions"), where("is_sandbox", "==", false), where("transaction_type", "in", VISIBLE_TYPES_ARR), orderBy("received_at", "desc"), startAfter(lastDoc), limit(PAGE_SIZE));
      const snap = await getDocs(q);
      if (snap.empty) { lastDoc = null; renderAll(); return; }
      snap.forEach(doc => allTxs.push(doc.data()));
      lastDoc = snap.docs[snap.docs.length - 1];
      updateFilters(); renderAll();
    }

    let firstSnapshotDone = false;
    function startListening() {
      const q = query(collection(db, "transactions"), where("is_sandbox", "==", false), where("transaction_type", "in", VISIBLE_TYPES_ARR), orderBy("received_at", "desc"), limit(SNAPSHOT_SIZE));
      onSnapshot(q, (snapshot) => {
        // Detect newly-added docs (skip initial load primer).
        if (firstSnapshotDone) {
          snapshot.docChanges().forEach(ch => {
            if (ch.type === "added") {
              const d = ch.doc.data();
              if (VISIBLE_TYPES.has(d.transaction_type)) fireReward(d);
            }
          });
        }
        firstSnapshotDone = true;

        allTxs = [];
        snapshot.forEach(doc => allTxs.push(doc.data()));
        lastDoc = snapshot.docs.length > 0 ? snapshot.docs[snapshot.docs.length - 1] : null;
        updateFilters(); renderAll();
      }, (err) => {
        console.error("Firestore error:", err);
        document.getElementById("container").innerHTML = '<div class="empty-state"><h2>Connection error</h2><p>' + err.message + '</p></div>';
      });
    }

    function startDashboard() {
      startListening();
      fetchSwStats();
      startSwStatsPolling();
    }

    // Refresh Superwall KPIs every 30min while tab visible, plus once on tab-return.
    // Skips polls when tab hidden (saves ClickHouse queries).
    const SW_POLL_INTERVAL_MS = 30 * 60 * 1000;
    function startSwStatsPolling() {
      setInterval(() => {
        if (document.hidden) return;
        fetchSwStats();
      }, SW_POLL_INTERVAL_MS);
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) fetchSwStats();
      });
    }

    // ============================================================
    // REWARD SYSTEM — visual + audio on new conversion/renewal/refund
    // ============================================================
    let audioCtx = null;
    let soundEnabled = localStorage.getItem("rewardSound") !== "off";

    function getAudioCtx() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }

    // Master compressor for punch + warmth
    function makeMasterChain() {
      const ctx = getAudioCtx();
      if (!ctx) return null;
      if (ctx._master) return ctx._master;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -18;
      comp.knee.value = 12;
      comp.ratio.value = 6;
      comp.attack.value = 0.003;
      comp.release.value = 0.25;
      const master = ctx.createGain();
      master.gain.value = 1.0;
      comp.connect(master).connect(ctx.destination);
      ctx._master = comp;
      return comp;
    }

    // Reverb impulse — synthetic short tail for sparkle
    function getReverb() {
      const ctx = getAudioCtx();
      if (!ctx) return null;
      if (ctx._reverb) return ctx._reverb;
      const len = ctx.sampleRate * 1.2;
      const ir = ctx.createBuffer(2, len, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const data = ir.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
        }
      }
      const conv = ctx.createConvolver();
      conv.buffer = ir;
      const wet = ctx.createGain();
      wet.gain.value = 0.25;
      conv.connect(wet);
      ctx._reverb = { input: conv, output: wet };
      return ctx._reverb;
    }

    // White noise burst (for "sssh" sparkle layer)
    function noiseBurst(duration, freqStart, freqEnd, volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.Q.value = 3;
      bp.frequency.setValueAtTime(freqStart, now);
      bp.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      src.connect(bp).connect(gain);
      gain.connect(master);
      if (reverb) gain.connect(reverb.input);
      src.start(now);
      src.stop(now + duration + 0.05);
    }

    // Sub-bass thump (punch)
    function bassThump(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(90, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.18);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain).connect(master);
      osc.start(now);
      osc.stop(now + 0.3);
    }

    // BOMBASTIC cha-ching: bass thump + bell stack chord + sparkle noise + reverb + harmonics
    function playChaChing(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;

      // Layer 1: bass thump
      bassThump(volume * 0.9);

      // Layer 2: bell-like chord stack (C E G C — major triad up an octave)
      const chord = [
        { freq: 1046.5,  start: 0.02, dur: 0.55, gain: 0.7 },  // C6
        { freq: 1318.51, start: 0.04, dur: 0.65, gain: 0.8 },  // E6
        { freq: 1567.98, start: 0.06, dur: 0.80, gain: 0.9 },  // G6
        { freq: 2093.0,  start: 0.10, dur: 1.10, gain: 0.6 },  // C7
        { freq: 2637.0,  start: 0.14, dur: 1.30, gain: 0.4 },  // E7 sparkle
        { freq: 3136.0,  start: 0.18, dur: 1.50, gain: 0.3 },  // G7 sparkle
      ];
      chord.forEach(n => {
        // Fundamental
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = n.freq;
        const t0 = now + n.start;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * n.gain, t0 + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + n.dur);
        osc.connect(gain).connect(master);
        if (reverb) gain.connect(reverb.input);
        osc.start(t0);
        osc.stop(t0 + n.dur + 0.05);

        // Second harmonic (sine, lower amp) for shimmer
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = "sine";
        osc2.frequency.value = n.freq * 2;
        gain2.gain.setValueAtTime(0, t0);
        gain2.gain.linearRampToValueAtTime(volume * n.gain * 0.25, t0 + 0.005);
        gain2.gain.exponentialRampToValueAtTime(0.001, t0 + n.dur * 0.7);
        osc2.connect(gain2).connect(master);
        osc2.start(t0);
        osc2.stop(t0 + n.dur + 0.05);
      });

      // Layer 3: sparkle noise sweep (the "shimmer" sound)
      noiseBurst(0.4, 4000, 10000, volume * 0.15);
      noiseBurst(0.6, 2000, 6000, volume * 0.1);
    }

    // BIG coin ping with brightness + tiny chord follow
    function playCoin(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;

      // Main ping
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(1568, now); // G6
      osc.frequency.exponentialRampToValueAtTime(2349, now + 0.04); // D7
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.connect(gain).connect(master);
      if (reverb) gain.connect(reverb.input);
      osc.start(now);
      osc.stop(now + 0.4);

      // Follow-up fifth (tiny shimmer)
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = "sine";
      osc2.frequency.value = 3136; // G7
      gain2.gain.setValueAtTime(0, now + 0.06);
      gain2.gain.linearRampToValueAtTime(volume * 0.4, now + 0.07);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc2.connect(gain2).connect(master);
      osc2.start(now + 0.06);
      osc2.stop(now + 0.55);
    }

    // BOMBASTIC sad: bass drop + descending sawtooth chord
    function playSad(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const now = ctx.currentTime;
      // Three voices descending in a minor chord
      [
        { startF: 523, endF: 130, dur: 0.9, gain: 0.5 },  // C5 → C3
        { startF: 622, endF: 155, dur: 0.9, gain: 0.4 },  // Eb
        { startF: 392, endF: 98,  dur: 0.9, gain: 0.4 },  // G4 → G2
      ].forEach(v => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(v.startF, now);
        osc.frequency.exponentialRampToValueAtTime(v.endF, now + v.dur);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(volume * v.gain, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, now + v.dur);
        osc.connect(gain).connect(master);
        osc.start(now);
        osc.stop(now + v.dur + 0.05);
      });
    }

    // Screen shake on huge wins
    function screenShake(intensity, durationMs) {
      const root = document.body;
      const start = performance.now();
      function tick(now) {
        const t = now - start;
        if (t >= durationMs) {
          root.style.transform = "";
          return;
        }
        const decay = 1 - t / durationMs;
        const x = (Math.random() - 0.5) * intensity * decay;
        const y = (Math.random() - 0.5) * intensity * decay;
        root.style.transform = `translate(${x}px,${y}px)`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Draw a 5-point star
    function drawStar(c, size) {
      const spikes = 5;
      const outer = size;
      const inner = size * 0.5;
      c.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outer : inner;
        const a = (Math.PI / spikes) * i - Math.PI / 2;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
      }
      c.closePath();
      c.fill();
    }

    // BOMBASTIC confetti — multi-origin burst, mixed shapes, sparkle trails, screen shake
    function launchConfetti(count, colors) {
      const canvas = document.createElement("canvas");
      canvas.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9999";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const c = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;

      // Multi-origin: center + two bottom corners (firework cannon style)
      const origins = [
        { x: W / 2,       y: H / 2,       angleMin: -Math.PI, angleMax: 0, power: 1.0 },
        { x: 0,           y: H,           angleMin: -Math.PI * 0.75, angleMax: -Math.PI * 0.25, power: 1.2 },
        { x: W,           y: H,           angleMin: -Math.PI * 0.75, angleMax: -Math.PI * 0.25, power: 1.2 },
      ];

      const shapes = ["rect", "circle", "star", "ribbon"];
      const parts = [];
      for (let i = 0; i < count; i++) {
        const origin = origins[i % origins.length];
        const angle = origin.angleMin + Math.random() * (origin.angleMax - origin.angleMin);
        const speed = (8 + Math.random() * 14) * origin.power;
        parts.push({
          x: origin.x + (Math.random() - 0.5) * 40,
          y: origin.y + (Math.random() - 0.5) * 40,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          g: 0.28 + Math.random() * 0.12,
          drag: 0.985 + Math.random() * 0.01,
          size: 5 + Math.random() * 9,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * Math.PI * 2,
          vrot: (Math.random() - 0.5) * 0.4,
          shape: shapes[Math.floor(Math.random() * shapes.length)],
          flutter: Math.random() * Math.PI * 2,
          flutterSpeed: 0.1 + Math.random() * 0.15,
          life: 0,
          maxLife: 250 + Math.random() * 100,
        });
      }

      // Sparkle particles (smaller, glowing, longer fade)
      const sparkles = [];
      const sparkleCount = Math.floor(count * 0.4);
      for (let i = 0; i < sparkleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        sparkles.push({
          x: W / 2 + (Math.random() - 0.5) * 100,
          y: H / 2 + (Math.random() - 0.5) * 100,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 3,
          g: 0.05,
          drag: 0.96,
          size: 1.5 + Math.random() * 2.5,
          color: "#fffbe6",
          life: 0,
          maxLife: 60 + Math.random() * 40,
        });
      }

      let raf;
      function frame() {
        c.clearRect(0, 0, W, H);
        let alive = 0;

        // Confetti
        for (const p of parts) {
          p.vy += p.g;
          p.vx *= p.drag;
          p.vy *= p.drag;
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vrot;
          p.flutter += p.flutterSpeed;
          p.life++;
          if (p.y < H + 50 && p.life < p.maxLife) {
            alive++;
            c.save();
            c.translate(p.x, p.y);
            c.rotate(p.rot);
            // Flutter scale: simulate paper tumbling in air
            const flutterScale = Math.abs(Math.cos(p.flutter));
            c.scale(flutterScale + 0.3, 1);
            c.fillStyle = p.color;
            const fade = 1 - p.life / p.maxLife;
            c.globalAlpha = Math.min(1, fade * 1.5);
            if (p.shape === "rect") {
              c.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
            } else if (p.shape === "circle") {
              c.beginPath();
              c.arc(0, 0, p.size / 2, 0, Math.PI * 2);
              c.fill();
            } else if (p.shape === "star") {
              drawStar(c, p.size * 0.6);
            } else if (p.shape === "ribbon") {
              c.fillRect(-p.size / 2, -p.size / 8, p.size * 1.5, p.size / 4);
            }
            c.restore();
          }
        }

        // Sparkles
        for (const s of sparkles) {
          s.vy += s.g;
          s.vx *= s.drag;
          s.vy *= s.drag;
          s.x += s.vx;
          s.y += s.vy;
          s.life++;
          if (s.life < s.maxLife) {
            alive++;
            const fade = 1 - s.life / s.maxLife;
            c.save();
            c.globalAlpha = fade;
            c.fillStyle = s.color;
            c.shadowBlur = 12;
            c.shadowColor = "#fde047";
            c.beginPath();
            c.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            c.fill();
            c.restore();
          }
        }

        if (alive > 0) {
          raf = requestAnimationFrame(frame);
        } else {
          cancelAnimationFrame(raf);
          canvas.remove();
        }
      }
      frame();
    }

    // Flash whole screen briefly (refunds)
    function flashScreen(color) {
      const overlay = document.createElement("div");
      overlay.style.cssText = `position:fixed;inset:0;background:${color};opacity:0.4;pointer-events:none;z-index:9998;transition:opacity 0.6s ease-out`;
      document.body.appendChild(overlay);
      requestAnimationFrame(() => { overlay.style.opacity = "0"; });
      setTimeout(() => overlay.remove(), 700);
    }

    // Toast in top-right
    function showToast(msg, color) {
      const t = document.createElement("div");
      t.style.cssText = `position:fixed;top:20px;right:20px;background:${color};color:#000;padding:14px 18px;border-radius:10px;font-weight:700;font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:10000;transform:translateX(120%);transition:transform 0.35s cubic-bezier(0.2,0.9,0.3,1.2)`;
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => { t.style.transform = "translateX(0)"; });
      setTimeout(() => {
        t.style.transform = "translateX(120%)";
        setTimeout(() => t.remove(), 400);
      }, 3500);
    }

    // Animated $ amount fly from center → KPI region
    function flyAmount(amount, color) {
      const el = document.createElement("div");
      el.textContent = `+$${amount.toFixed(2)}`;
      el.style.cssText = `position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.6);color:${color};font-weight:800;font-size:64px;text-shadow:0 4px 20px rgba(0,0,0,0.6);pointer-events:none;z-index:10001;transition:transform 1.2s cubic-bezier(0.4,0,0.2,1),opacity 1.2s ease-out;opacity:1`;
      document.body.appendChild(el);
      requestAnimationFrame(() => {
        el.style.transform = "translate(-50%,-50%) scale(1.4)";
        setTimeout(() => {
          // Fly up to KPI area
          el.style.transform = "translate(-50%,-300px) scale(0.4)";
          el.style.opacity = "0";
        }, 400);
      });
      setTimeout(() => el.remove(), 1700);
    }

    function fireReward(tx) {
      if (document.hidden) {
        // Tab not focused — fire confetti/toast anyway, audio will queue silently if needed
      }
      const type = tx.transaction_type;
      const price = Number(tx.price || 0);
      const app = tx.app_name || "Unknown";
      // Plan from product id — same rule as the churn/refund cohorts:
      // 'annual' or 'year' in the id → annual, otherwise weekly.
      const pid = (tx.product_id || "").toLowerCase();
      const isAnnual = pid.includes("annual") || pid.includes("year");

      if (type === "new_subscription" || type === "trial_to_paid" || type === "one_time_purchase") {
        // Conversion reward tiered by $amount only (not by type):
        //   tier 1: < $10        — small celebration
        //   tier 2: $10 – $60    — medium celebration
        //   tier 3: > $60        — HUGE celebration
        const tier = price > 60 ? 3 : price >= 10 ? 2 : 1;
        const confettiCount = tier === 3 ? 350 : tier === 2 ? 200 : 120;
        const vol = Math.min(0.55, 0.2 + tier * 0.12);
        // Distinct cue per plan: annual (big money) = bombastic cha-ching,
        // weekly = cash chord arpeggio. Volume still scales with $ tier.
        if (soundEnabled) { if (isAnnual) playChaChing(vol); else playCashChord(vol); }
        launchConfetti(confettiCount, [
          "#4ade80","#22c55e","#16a34a","#86efac","#bbf7d0",
          "#fde047","#facc15","#eab308","#fef08a",
          "#ffffff","#fff7ed"
        ]);
        flyAmount(price, "#4ade80");
        showToast(`💰 ${app} • $${price.toFixed(2)}`, "#4ade80");
      } else if (type === "renewal") {
        if (soundEnabled) playCoin(0.3);
        launchConfetti(70, ["#a855f7","#c084fc","#d8b4fe","#e9d5ff","#fde047","#ffffff"]);
        flyAmount(price, "#c084fc");
        showToast(`🔁 ${app} renewal • $${price.toFixed(2)}`, "#c084fc");
      } else if (type === "refund") {
        // No audio for refunds (by request) — keep the visual cue only.
        flashScreen("#dc2626");
        showToast(`💸 ${app} refund • -$${price.toFixed(2)}`, "#fca5a5");
      }
    }

    // Sound toggle button — also primes AudioContext on first click (browser autoplay policy)
    function installSoundToggle() {
      const btn = document.createElement("button");
      btn.id = "soundToggle";
      btn.style.cssText = "position:fixed;bottom:20px;right:20px;background:#222;color:#fff;border:1px solid #444;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;z-index:9997;display:flex;align-items:center;justify-content:center";
      function render() { btn.textContent = soundEnabled ? "🔊" : "🔇"; btn.title = soundEnabled ? "Mute rewards" : "Unmute rewards"; }
      render();
      btn.addEventListener("click", () => {
        soundEnabled = !soundEnabled;
        localStorage.setItem("rewardSound", soundEnabled ? "on" : "off");
        render();
        // Prime audio context with a click so browser allows future programmatic playback
        getAudioCtx();
        if (soundEnabled) playCoin(0.15); // confirm-tone
      });
      document.body.appendChild(btn);
    }
    installSoundToggle();

    // ============================================================
    // TEMPORARY REWARD TESTER PANEL
    // Toggle with ?test=1 in URL, or always-on for now.
    // Remove block once tuning is done.
    // ============================================================
    function installTesterPanel() {
      const panel = document.createElement("div");
      panel.id = "rewardTester";
      panel.style.cssText = "position:fixed;bottom:80px;right:20px;background:#1a1a1a;border:1px solid #444;border-radius:10px;padding:14px;z-index:9996;color:#fff;font-size:12px;width:280px;box-shadow:0 8px 30px rgba(0,0,0,0.6);font-family:-apple-system,sans-serif";
      panel.innerHTML = `
        <div id="testerHeader" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none">
          <strong style="font-size:13px">🎛 Reward Tester</strong>
          <span id="testerChevron" style="color:#888;font-size:14px">▸</span>
        </div>
        <div id="testerBody" style="display:none;flex-direction:column;gap:6px;margin-top:10px">
          <div style="opacity:0.6;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px">Conversions (tiered)</div>
          <button data-act="conv" data-price="4.99" class="tb">💰 New sub \$4.99 (tier 1)</button>
          <button data-act="conv" data-price="19.99" class="tb">💰 New sub \$19.99 (tier 2)</button>
          <button data-act="conv" data-price="59.99" class="tb">💰 New sub \$59.99 (tier 3 - huge)</button>
          <button data-act="t2p" data-price="29.99" class="tb">💰 Trial→Paid \$29.99</button>

          <div style="opacity:0.6;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px">Renewals</div>
          <button data-act="renewal" data-price="4.99" class="tb">🔁 Renewal \$4.99</button>
          <button data-act="renewal" data-price="59.99" class="tb">🔁 Renewal \$59.99</button>

          <div style="opacity:0.6;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px">Refunds</div>
          <button data-act="refund" data-price="9.99" class="tb">💸 Refund \$9.99</button>
          <button data-act="refund" data-price="59.99" class="tb">💸 Refund \$59.99</button>

          <div style="opacity:0.85;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:10px;color:#4ade80;font-weight:700">★ Live sale cues (by plan)</div>
          <div class="sfx-row"><span class="sfx-lab">weekly sale</span>
            <button data-snd="cashchord" class="tb sfx">🎵 Cash chord</button></div>
          <div class="sfx-row"><span class="sfx-lab">annual sale</span>
            <button data-snd="chaching" class="tb sfx">🔔 Cha-ching</button></div>
          <div style="opacity:0.5;font-size:10px;margin:2px 0 2px">Refunds are silent. These are what actually fire now.</div>

          <div style="opacity:0.6;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px">Sound variants only</div>
          <button data-snd="chaching" class="tb">🔔 Cha-ching</button>
          <button data-snd="coin" class="tb">🪙 Coin ping</button>
          <button data-snd="sad" class="tb">😞 Sad trombone</button>
          <button data-snd="chord" class="tb">🎵 Cash chord (alt)</button>
          <button data-snd="kalimba" class="tb">🎼 Kalimba (alt)</button>
          <button data-snd="mega" class="tb">🎺 MEGA win (chaching + arp)</button>
          <button data-snd="bass" class="tb">🥁 Bass thump only</button>
          <button data-snd="sparkle" class="tb">✨ Sparkle noise only</button>

          <div style="opacity:0.6;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:8px">Visual variants only</div>
          <button data-vis="confetti-heavy" class="tb">🎊 Confetti heavy</button>
          <button data-vis="confetti-light" class="tb">🎉 Confetti light</button>
          <button data-vis="flash-green" class="tb">⚡ Flash green</button>
          <button data-vis="flash-red" class="tb">⚡ Flash red</button>
          <button data-vis="fly-amount" class="tb">💸 Flying \$50</button>
        </div>
        <style>
          #rewardTester .tb { background:#2a2a2a;color:#fff;border:1px solid #3a3a3a;border-radius:6px;padding:8px 10px;font-size:12px;cursor:pointer;text-align:left;font-family:inherit }
          #rewardTester .tb:hover { background:#383838;border-color:#555 }
          #rewardTester .sfx-row { display:flex;align-items:center;gap:6px }
          #rewardTester .sfx-lab { flex:0 0 92px;font-size:10px;color:#9a9a9a }
          #rewardTester .tb.sfx { flex:1;text-align:center;padding:7px 6px }
        </style>
      `;
      document.body.appendChild(panel);

      const body = panel.querySelector("#testerBody");
      const chevron = panel.querySelector("#testerChevron");
      let open = localStorage.getItem("testerOpen") === "1"; // closed by default
      function applyOpen() {
        body.style.display = open ? "flex" : "none";
        chevron.textContent = open ? "▾" : "▸";
      }
      applyOpen();
      panel.querySelector("#testerHeader").onclick = () => {
        open = !open;
        localStorage.setItem("testerOpen", open ? "1" : "0");
        applyOpen();
      };

      panel.querySelectorAll("button[data-act]").forEach(b => {
        b.onclick = () => {
          const act = b.dataset.act;
          const price = Number(b.dataset.price);
          const fakeApp = "TestApp";
          let type;
          if (act === "conv") type = "new_subscription";
          else if (act === "t2p") type = "trial_to_paid";
          else if (act === "renewal") type = "renewal";
          else if (act === "refund") type = "refund";
          fireReward({ transaction_type: type, price, app_name: fakeApp });
        };
      });
      panel.querySelectorAll("button[data-snd]").forEach(b => {
        b.onclick = () => {
          getAudioCtx();
          const s = b.dataset.snd;
          if (s === "chaching") playChaChing(0.4);
          else if (s === "coin") playCoin(0.3);
          else if (s === "sad") playSad(0.4);
          else if (s === "chord") playCashChord(0.4);
          else if (s === "kalimba") playKalimba(0.4);
          else if (s === "mega") playMegaWin(0.5);
          else if (s === "bass") bassThump(0.6);
          else if (s === "sparkle") { noiseBurst(0.5, 4000, 10000, 0.3); noiseBurst(0.7, 2000, 6000, 0.2); }
          else if (s === "cashchord") playCashChord(0.45);
        };
      });
      panel.querySelectorAll("button[data-vis]").forEach(b => {
        b.onclick = () => {
          const v = b.dataset.vis;
          if (v === "confetti-heavy") launchConfetti(240, ["#4ade80","#22c55e","#fde047","#facc15"]);
          else if (v === "confetti-light") launchConfetti(25, ["#a855f7","#c084fc"]);
          else if (v === "flash-green") flashScreen("#16a34a");
          else if (v === "flash-red") flashScreen("#dc2626");
          else if (v === "fly-amount") flyAmount(50, "#4ade80");
        };
      });
    }

    // Alt sound variants (so you can A/B in tester)
    function playCashChord(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      // Major chord arpeggio: C5 E5 G5 C6
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = f;
        const t0 = now + i * 0.05;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * 0.6, t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.6);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.65);
      });
    }

    function playMegaWin(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      // Full cha-ching + ascending arpeggio over the top
      playChaChing(volume);
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;
      // C major arpeggio sweeping up
      const notes = [261.63, 329.63, 392, 523.25, 659.25, 783.99, 1046.5];
      notes.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = f;
        const t0 = now + 0.25 + i * 0.08;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * 0.5, t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);
        osc.connect(gain).connect(master);
        if (reverb) gain.connect(reverb.input);
        osc.start(t0);
        osc.stop(t0 + 0.45);
      });
    }

    function playKalimba(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      // Pentatonic plink
      [880, 1318.51, 1760].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = f;
        const t0 = now + i * 0.07;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * 0.5, t0 + 0.003);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.35);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.4);
      });
    }

    // Tester panel hidden by default — append ?test=1 to the URL to show it.
    if (new URLSearchParams(location.search).has("test")) installTesterPanel();
  </script>
