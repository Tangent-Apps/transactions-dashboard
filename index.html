<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }

    /* Combined sticky toolbar (replaces old .header + .filters + .type-filters) */
    .toolbar {
      background: #141414; border-bottom: 1px solid #232323;
      padding: 10px 20px;
      display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    /* Middle track holds Activity-only controls; hidden on Revenue but the 1fr
       track persists, so the section nav in the last track never shifts. */
    .toolbar-mid { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .toolbar-mid.hidden { visibility: hidden; }
    .toolbar .brand { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #aaa; flex-shrink: 0; }
    .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* App filter chips — horizontal scroll with fade */
    .filters-wrap { flex: 1; min-width: 0; position: relative; }
    .filters { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 2px 24px 2px 2px; }
    .filters::-webkit-scrollbar { display: none; }
    .filters-wrap::after {
      content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 32px;
      background: linear-gradient(to right, transparent, #141414); pointer-events: none;
    }
    .filter-btn { padding: 5px 12px; border-radius: 16px; border: 1px solid #2a2a2a; background: transparent; color: #888; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .filter-btn:hover { border-color: #444; color: #ccc; }
    .filter-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 500; }

    /* Primary section nav — Activity | Revenue. Lives in the toolbar grid's
       fixed last track, so its position is constant across sections. */
    .section-nav { display: flex; gap: 4px; flex-shrink: 0; background: #101010; border: 1px solid #262626; border-radius: 9px; padding: 3px; }
    .section-btn { padding: 6px 15px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #777; border-radius: 6px; transition: all 0.15s; white-space: nowrap; letter-spacing: -0.01em; }
    .section-btn:hover { color: #bbb; }
    .section-btn.active { background: #232323; color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }

    /* Activity sub-controls (Live/History) — subordinate to section nav */
    .activity-controls { display: flex; flex-shrink: 0; }
    /* Live/History toggle */
    .view-toggle { display: flex; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 7px; overflow: hidden; flex-shrink: 0; }
    .toggle-btn { padding: 5px 12px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: #555; transition: all 0.2s; white-space: nowrap; }
    .toggle-btn.live-active { background: #1a2e1a; color: #4ade80; }
    .toggle-btn.history-active { background: #1e1e2e; color: #818cf8; }

    /* Container */
    .container { max-width: 1500px; margin: 0 auto; padding: 16px 20px; }

    /* KPI strip */
    .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .kpis.kpis-2 { grid-template-columns: repeat(2, 1fr); }
    .kpis.kpis-4 { grid-template-columns: repeat(4, 1fr); }
    .kpis.kpis-5 { grid-template-columns: repeat(5, 1fr); }
    .kpis.kpis-6 { grid-template-columns: repeat(6, 1fr); }
    .kpi { background: #141414; border: 1px solid #232323; border-radius: 10px; padding: 12px 14px; min-width: 0; }
    .kpi .k-label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
    .kpi .k-value { font-size: 20px; font-weight: 700; color: #fff; margin-top: 4px; line-height: 1.15; }
    .kpi .k-sub { font-size: 11px; color: #888; margin-top: 3px; }
    .kpi .k-sub.up { color: #4ade80; }
    .kpi .k-sub.down { color: #f87171; }
    .kpi.primary { background: linear-gradient(135deg, #161616, #1c1c1c); }
    .kpi.primary .k-value { font-size: 24px; }

    /* 3-column layout (weighted: conversions, renewals, refunds) */
    .columns { display: grid; grid-template-columns: 1.2fr 1.5fr 0.8fr; gap: 12px; }
    .columns.no-refunds { grid-template-columns: 1fr 1fr; }
    .col { background: #131313; border: 1px solid #232323; border-radius: 12px; padding: 12px; min-width: 0; display: flex; flex-direction: column; }
    .col-header { display: flex; align-items: baseline; justify-content: space-between; padding: 4px 4px 10px; border-bottom: 1px solid #232323; margin-bottom: 10px; gap: 8px; }
    .col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
    .col-title::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }
    .col-title.conv { color: #4ade80; }
    .col-title.conv::before { background: #4ade80; }
    .col-title.renew { color: #c084fc; }
    .col-title.renew::before { background: #c084fc; }
    .col-title.refund { color: #f5a07a; }
    .col-title.refund::before { background: #f5a07a; }
    .col-totals { font-size: 11px; color: #888; text-align: right; }
    .col-totals .amt { font-weight: 700; color: #fff; display: block; font-size: 13px; }
    .col-totals .cnt { font-size: 10px; color: #777; }

    /* Tx cards inside columns — compact */
    .tx-card { background: #1a1a1a; border: 1px solid #232323; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; transition: background 0.15s; display: grid; grid-template-columns: 32px 1fr auto; gap: 10px; align-items: center; position: relative; overflow: hidden; }
    .tx-card.recovered { border-left: 3px solid #4ade80; padding-left: 10px; }
    .tx-card:hover { background: #1f1f1f; }
    .tx-card:last-child { margin-bottom: 0; }
    .tx-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; overflow: hidden; background: #2a2a2a; color: #aaa; }
    .tx-icon img { width: 100%; height: 100%; object-fit: cover; }
    .tx-info { min-width: 0; }
    .tx-info h3 { font-size: 13px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-ltv { display: none; margin-left: 7px; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 5px; vertical-align: middle; letter-spacing: 0.2px; }
    .tx-ltv.shown { display: inline-block; }
    .tx-ltv.tier-base  { background: #2a2a2a; color: #9ca3af; }
    .tx-ltv.tier-mid   { background: rgba(168,85,247,0.18); color: #d8b4fe; }
    .tx-ltv.tier-whale { background: rgba(250,204,21,0.18); color: #fde047; }
    .tx-info p { font-size: 11px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .tx-right { text-align: right; flex-shrink: 0; }
    .tx-price { font-size: 14px; font-weight: 700; color: #4ade80; line-height: 1.2; }
    .tx-price.refund { color: #f5a07a; }
    .tx-price.renewal { color: #c084fc; }
    .tx-time { font-size: 10px; color: #666; margin-top: 2px; }
    .tx-id { font-size: 9px; color: #444; font-family: 'SF Mono', SFMono-Regular, Menlo, monospace; margin-top: 2px; cursor: pointer; opacity: 0; transition: opacity 0.15s, color 0.15s; }
    .tx-card:hover .tx-id { opacity: 1; }
    .tx-id:hover { color: #888; }
    .tx-id.copied { color: #4ade80; opacity: 1; }
    .country-flag { margin-left: 4px; }

    .empty-col { text-align: center; padding: 28px 12px; color: #444; font-size: 11px; }

    /* Day group headers (history) */
    .day-header { display: flex; align-items: baseline; justify-content: space-between; padding: 18px 0 8px; gap: 12px; flex-wrap: wrap; }
    .day-header:first-child { padding-top: 0; }
    .day-label { font-size: 13px; font-weight: 600; color: #aaa; }
    .day-summary { font-size: 13px; font-weight: 600; color: #fff; text-align: right; }
    .day-summary .breakdown { display: block; font-size: 11px; color: #888; font-weight: 500; margin-top: 2px; }
    .day-summary .breakdown span { margin-left: 8px; }
    .day-summary .breakdown .b-conv { color: #4ade80; }
    .day-summary .breakdown .b-renew { color: #c084fc; }
    .day-summary .breakdown .b-refund { color: #f5a07a; }

    /* Portfolio (MRR) view */
    .pf-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
    .pf-big { display: flex; gap: 34px; flex-wrap: wrap; }
    .pf-metric .pf-m-label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
    .pf-metric .pf-m-value { font-size: 38px; font-weight: 800; color: #fff; line-height: 1.05; margin-top: 4px; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
    .pf-metric .pf-m-value.mrr { color: #fbbf24; }
    .pf-metric .pf-m-value.plain { color: #e0e0e0; }
    .pf-metric .pf-m-sub { font-size: 12px; margin-top: 5px; color: #888; font-weight: 600; }
    .pf-metric .pf-m-sub.up { color: #4ade80; }
    .pf-metric .pf-m-sub.down { color: #f87171; }
    .pf-metric .pf-m-sub.dim { color: #777; }
    .pf-vs.up { color: #4ade80; } .pf-vs.down { color: #f87171; } .pf-vs.dim { color: #777; }
    .pf-ranges { display: flex; gap: 6px; background: #141414; border: 1px solid #232323; border-radius: 9px; padding: 4px; }
    .pf-range-btn { padding: 6px 13px; font-size: 12px; font-weight: 600; border: none; background: transparent; color: #666; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .pf-range-btn.active { background: #2a2416; color: #fbbf24; }
    .pf-chart-wrap { background: #131313; border: 1px solid #232323; border-radius: 14px; padding: 18px 16px 8px; margin-bottom: 18px; position: relative; }
    .pf-chart-wrap svg { width: 100%; height: auto; display: block; overflow: visible; }
    .pf-tip { position: absolute; pointer-events: none; background: #000; border: 1px solid #333; border-radius: 7px; padding: 6px 9px; font-size: 11px; color: #fff; white-space: nowrap; opacity: 0; transition: opacity 0.1s; z-index: 5; transform: translate(-50%, -115%); }
    .pf-tip .t-date { color: #888; font-size: 10px; }
    .pf-tip .t-mrr { color: #fbbf24; font-weight: 700; }
    .pf-tip .t-arr { color: #a5b4fc; font-weight: 600; font-size: 10px; margin-top: 1px; }
    .pf-legend { display: flex; justify-content: space-between; margin-bottom: 8px; padding: 0 16px; font-size: 11px; color: #888; }
    .pf-legend .pf-lg { display: flex; align-items: center; gap: 6px; }
    .pf-legend i { width: 16px; height: 0; border-top-width: 2px; border-top-style: solid; display: inline-block; }
    .pf-legend .sw-mrr { border-top-color: #fbbf24; }
    .pf-legend .sw-arr { border-top-color: #5a6a8a; }
    .pf-apps { background: #131313; border: 1px solid #232323; border-radius: 14px; padding: 16px; }
    .pf-apps h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; font-weight: 700; margin-bottom: 12px; }
    .pf-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pf-table th { text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #666; padding: 10px 10px; border-bottom: 1px solid #232323; position: sticky; top: 56px; background: #131313; z-index: 5; }
    .pf-table th.r, .pf-table td.r { text-align: right; }
    .pf-table td { padding: 9px 10px; border-bottom: 1px solid #1c1c1c; }
    .pf-table tr:last-child td { border-bottom: none; }
    .pf-t-app { font-weight: 600; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .pf-t-num { font-variant-numeric: tabular-nums; color: #fff; font-weight: 600; }
    .pf-t-num.dim { color: #888; font-weight: 500; }
    /* heatmap cells (churn/refund cohort tables) */
    .pf-table td.heat { text-align: center; padding: 6px 8px; }
    .pf-table td.heat .hcell {
      display: inline-block; min-width: 46px; padding: 4px 8px; border-radius: 6px;
      font-variant-numeric: tabular-nums; font-weight: 600; line-height: 1.3;
      transition: background 0.2s ease;
    }
    .pf-table td.heat.dim .hcell { color: #5a5a5a; background: transparent !important; font-weight: 500; }
    .pf-table td.heat-total .hcell { min-width: 52px; }
    /* partial = window entered but not yet fully matured; value is still accruing */
    .pf-table td.heat.partial .hcell { opacity: 0.72; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14); }
    .pf-table td.heat.partial .hcell::before { content: "~"; opacity: 0.6; margin-right: 1px; }
    .pf-t-spark { vertical-align: middle; width: 130px; }
    .pf-t-spark svg { vertical-align: middle; }
    .pf-t-delta { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .pf-t-delta.up { color: #4ade80; } .pf-t-delta.down { color: #f87171; } .pf-t-delta.flat { color: #666; }
    .pf-stale { font-size: 11px; color: #f5a07a; margin-bottom: 12px; }

    /* Churn view */
    .ch-sub { font-size: 12px; color: #888; margin-top: 5px; max-width: 62ch; line-height: 1.5; }
    /* Plan + Range pills, top-right (mirrors Revenue's range row) */
    .ch-filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    /* Plan segment: green active tint, so it reads as a different axis than the gold Range */
    .pf-ranges.ch-plan .pf-range-btn.active { background: #17281a; color: #7ee08a; }
    /* App selector = chips on their own row below (matches toolbar app filter idiom) */
    .ch-appbar { display: flex; gap: 6px; flex-wrap: wrap; margin: -6px 0 16px; }
    .ch-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; padding: 0 14px; font-size: 11px; color: #999; }
    .ch-legend .ch-lg { display: flex; align-items: center; gap: 6px; }
    .ch-legend i { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }
    .ch-foot { font-size: 11px; color: #666; margin-top: 12px; line-height: 1.5; }
    #chTip, #rfTip { transform: translateX(-50%); min-width: 150px; text-align: left; white-space: normal; }
    #chTip.flip-left, #rfTip.flip-left { transform: translateX(-100%); }
    #chTip.flip-right, #rfTip.flip-right { transform: translateX(0); }
    /* Refund metric segment: blue active tint, distinct from green Plan / gold Range */
    .pf-ranges.rf-metric .pf-range-btn.active { background: #16222e; color: #7ec4f0; }
    .pf-tip .t-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #ccc; margin-top: 3px; }
    .pf-tip .t-sw { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .pf-tip .t-val { margin-left: auto; padding-left: 14px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }

    .show-more { display: block; width: 100%; padding: 12px; margin: 16px 0; background: #1a1a1a; border: 1px solid #232323; border-radius: 10px; color: #aaa; font-size: 13px; cursor: pointer; }
    .show-more:hover { background: #222; color: #fff; }
    .empty-state { text-align: center; padding: 60px 20px; color: #555; }
    .empty-state h2 { font-size: 17px; margin-bottom: 6px; color: #777; }
    .empty-state p { font-size: 13px; }
    .loading { text-align: center; padding: 40px; color: #555; }

    /* Mobile */
    @media (max-width: 700px) {
      .toolbar { padding: 8px 14px; gap: 8px; flex-wrap: wrap; }
      .container { padding: 12px 14px; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
      .kpi:nth-child(n+3) { display: none; }
      .columns, .columns.no-refunds { grid-template-columns: 1fr; gap: 10px; }
      .tx-card { grid-template-columns: 30px 1fr auto; padding: 9px 11px; }
      .tx-id { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="brand"><span class="live-dot"></span> Transactions</span>
    <div class="toolbar-mid" id="activityControls">
      <div class="filters-wrap"><div class="filters" id="filters"><button class="filter-btn active" data-app="all">All</button></div></div>
      <div class="view-toggle">
        <button class="toggle-btn live-active" id="toggleLive" onclick="setActivityMode('live')">Live</button>
        <button class="toggle-btn" id="toggleHistory" onclick="setActivityMode('history')">History</button>
      </div>
    </div>
    <nav class="section-nav">
      <button class="section-btn active" id="sectionActivity" onclick="setSection('activity')">Activity</button>
      <button class="section-btn" id="sectionRevenue" onclick="setSection('revenue')">Revenue</button>
      <button class="section-btn" id="sectionChurn" onclick="setSection('churn')">Churn</button>
      <button class="section-btn" id="sectionRefunds" onclick="setSection('refunds')">Refunds</button>
      <button class="section-btn" id="sectionRoas" onclick="setSection('roas')">ROAS</button>
      <button class="section-btn" id="sectionProas" onclick="setSection('proas')">pROAS</button>
    </nav>
  </div>

  <div class="container" id="container">
    <div class="loading">Authenticating...</div>
  </div>

  <!-- Login overlay -->
  <div id="loginOverlay" style="display:none; position:fixed; inset:0; background:#0f0f0f; z-index:100; display:flex; align-items:center; justify-content:center;">
    <form id="loginForm" style="background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:28px; width:320px; max-width:90vw;">
      <h2 style="font-size:16px; color:#fff; margin-bottom:6px;">Dashboard login</h2>
      <p style="font-size:12px; color:#777; margin-bottom:16px;">Internal Tangent tool.</p>
      <input id="pwInput" type="password" placeholder="Password" autocomplete="current-password"
        style="width:100%; padding:10px 12px; background:#0f0f0f; border:1px solid #2a2a2a; border-radius:8px; color:#fff; font-size:14px; margin-bottom:10px; box-sizing:border-box;">
      <div id="loginErr" style="color:#f87171; font-size:12px; margin-bottom:10px; min-height:14px;"></div>
      <button type="submit" id="loginBtn"
        style="width:100%; padding:10px; background:#fff; color:#000; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Sign in</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, limit, startAfter, getDocs, getDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCnfHM5rp-p1wuEMN2BPE4koLrp9WqcQ_c",
      authDomain: "tangent-transactions-dashboard.firebaseapp.com",
      projectId: "tangent-transactions-dashboard",
      storageBucket: "tangent-transactions-dashboard.firebasestorage.app",
      messagingSenderId: "890857087611",
      appId: "1:890857087611:web:b871ac1b87fc7e1107f8de"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const DASHBOARD_AUTH_URL = "https://us-central1-tangent-transactions-dashboard.cloudfunctions.net/dashboardAuth";

    const overlay = document.getElementById("loginOverlay");
    const loginForm = document.getElementById("loginForm");
    const pwInput = document.getElementById("pwInput");
    const loginErr = document.getElementById("loginErr");
    const loginBtn = document.getElementById("loginBtn");

    function showLogin() {
      overlay.style.display = "flex";
      pwInput.focus();
    }
    function hideLogin() {
      overlay.style.display = "none";
    }

    async function tryLogin(password) {
      const r = await fetch(DASHBOARD_AUTH_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      if (!r.ok) throw new Error(r.status === 401 ? "Wrong password" : "Login failed");
      const { token } = await r.json();
      await signInWithCustomToken(auth, token);
      sessionStorage.setItem("dash_pw", password);
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginErr.textContent = "";
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";
      try {
        await tryLogin(pwInput.value);
        hideLogin();
      } catch (err) {
        loginErr.textContent = err.message;
        sessionStorage.removeItem("dash_pw");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign in";
      }
    });

    // Boot: if cached pw, try silent login; else show overlay
    (async () => {
      const cached = sessionStorage.getItem("dash_pw");
      if (cached) {
        try { await tryLogin(cached); return; }
        catch { sessionStorage.removeItem("dash_pw"); }
      }
      showLogin();
    })();

    let booted = false;
    onAuthStateChanged(auth, (user) => {
      if (user && !booted) {
        booted = true;
        startDashboard();
      }
    });

    const SNAPSHOT_SIZE = 200;
    const PAGE_SIZE = 50;
    let lastDoc = null;
    let currentApp = "all";
    let section = "activity";   // activity | revenue
    let viewMode = "live";       // live | history — the Activity sub-mode
    let allTxs = [];
    let knownApps = new Set();

    const CONVERSION_TYPES = new Set(["new_subscription", "trial_to_paid", "one_time_purchase"]);
    // Visible tx types (others like billing_issue/cancellation/expiration are stored for
    // recovery detection but hidden from the dashboard UI).
    const VISIBLE_TYPES = new Set(["new_subscription", "trial_to_paid", "one_time_purchase", "renewal", "refund"]);

    function fmtMoney(n) {
      const v = Math.round(Number(n) || 0);
      return "$" + v.toLocaleString("en-US");
    }

    // "2026-06-01" → "1 Jun" (shared by Revenue + Churn x-axis labels)
    const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    function fmtDayMon(dateStr) {
      const p = String(dateStr).slice(0,10).split("-");
      if (p.length < 3) return dateStr;
      return String(Number(p[2])) + " " + (MON[Number(p[1]) - 1] || "");
    }

    function buildMrrChart(pts, w, h) {
      // pts: [{date, mrr, arr}] ascending. Two lines: MRR (gold, left axis) + ARR (indigo, right axis).
      // ARR = 12*MRR so it shares the MRR shape; independent scaling keeps both readable.
      const padL = 8, padR = 8, padT = 12, padB = 26;
      const iw = w - padL - padR, ih = h - padT - padB;
      const mvals = pts.map(p => p.mrr);
      const mMin = Math.min(...mvals), mMax = Math.max(...mvals);
      const mSpan = (mMax - mMin) || 1;
      const mLo = mMin - mSpan*0.12, mHi = mMax + mSpan*0.12;
      const mRng = (mHi - mLo) || 1;
      // ARR uses the same fractional scale (identical shape), just labeled ×12 on the right.
      const x = i => padL + (pts.length <= 1 ? iw/2 : (i/(pts.length-1))*iw);
      const yM = v => padT + ih - ((v - mLo)/mRng)*ih;

      const pathFrom = (key) => {
        let d = "";
        pts.forEach((p,i) => { d += (i===0?"M":"L") + x(i).toFixed(1) + " " + yM(p.mrr).toFixed(1) + " "; });
        return d;
      };
      const mrrLine = pathFrom();
      const area = mrrLine + "L" + x(pts.length-1).toFixed(1) + " " + (padT+ih) + " L" + x(0).toFixed(1) + " " + (padT+ih) + " Z";

      // gridlines + dual axis labels (left MRR, right ARR = 12x)
      let grid = "";
      for (let g=0; g<=3; g++) {
        const mv = mLo + (mRng*g/3);
        const gy = yM(mv).toFixed(1);
        grid += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#1f1f1f" stroke-width="1"/>';
        grid += '<text x="'+padL+'" y="'+(gy-3)+'" fill="#7a6a3a" font-size="9" text-anchor="start">'+fmtMoney(mv)+'</text>';
        grid += '<text x="'+(w-padR)+'" y="'+(gy-3)+'" fill="#5a6a8a" font-size="9" text-anchor="end">'+fmtMoney(mv*12)+'</text>';
      }
      // x labels: first, mid, last (shared "1 Jun" format with Churn)
      let xlab = "";
      const xIdx = pts.length>2 ? [0, Math.floor(pts.length/2), pts.length-1] : pts.map((_,i)=>i);
      xIdx.forEach(i => { xlab += '<text x="'+x(i).toFixed(1)+'" y="'+(h-7)+'" fill="#666" font-size="9" text-anchor="middle">'+fmtDayMon(pts[i].date)+'</text>'; });

      // hover targets carry both mrr + arr
      let dots = "";
      pts.forEach((p,i) => {
        dots += '<circle class="pf-dot" data-i="'+i+'" cx="'+x(i).toFixed(1)+'" cy="'+yM(p.mrr).toFixed(1)+'" r="3" fill="#fbbf24" opacity="0"/>';
        dots += '<rect class="pf-hit" data-i="'+i+'" data-x="'+x(i).toFixed(1)+'" data-y="'+yM(p.mrr).toFixed(1)+'" data-mrr="'+p.mrr+'" data-arr="'+p.arr+'" data-date="'+p.date+'" x="'+(x(i)-(iw/pts.length/2)).toFixed(1)+'" y="'+padT+'" width="'+(iw/pts.length).toFixed(1)+'" height="'+ih+'" fill="transparent"/>';
      });
      return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">' +
        grid + xlab +
        '<defs><linearGradient id="pfg" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%" stop-color="#fbbf24" stop-opacity="0.24"/>' +
          '<stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>' +
        '</linearGradient></defs>' +
        '<path d="'+area+'" fill="url(#pfg)"/>' +
        '<path d="'+mrrLine+'" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>' +
        dots +
        '</svg>';
    }

    function renderPortfolio() {
      const container = document.getElementById("container");
      if (!mrrSnapshots) {
        container.innerHTML = '<div class="loading">Loading MRR…</div>';
        return;
      }
      if (mrrSnapshots.length === 0) {
        container.innerHTML = '<div class="empty-state"><h2>No MRR data yet</h2><p>Snapshots will appear once the daily job runs.</p></div>';
        return;
      }
      const all = mrrSnapshots;
      const pts = all.slice(-mrrRange).map(r => ({ date: r.date, mrr: Number(r.mrr)||0, arr: Number(r.arr)||(Number(r.mrr)||0)*12 }));
      const latest = all[all.length-1];
      const curMrr = Number(latest.mrr)||0;
      const curArr = Number(latest.arr)||(curMrr*12);

      // Period-over-period: current window = last N days; prior window = the N days before it.
      // Net-new = end-of-window minus start-of-window (change across the period).
      const curWin = all.slice(-mrrRange);
      const priorWin = all.slice(-mrrRange*2, -mrrRange);
      const winStartMrr = curWin.length ? (Number(curWin[0].mrr)||0) : curMrr;
      const netNewMrr = curMrr - winStartMrr;
      const netNewArr = netNewMrr * 12;
      // prior window's net-new, for the "vs previous period" comparison
      let priorNetMrr = null;
      if (priorWin.length >= 2) priorNetMrr = (Number(priorWin[priorWin.length-1].mrr)||0) - (Number(priorWin[0].mrr)||0);
      const netDir = netNewMrr >= 0 ? "up" : "down";
      const netArrow = netNewMrr >= 0 ? "▲" : "▼";
      // % of net-new vs prior window's net-new
      let vsPriorPct = null;
      if (priorNetMrr != null && Math.abs(priorNetMrr) > 0.01) vsPriorPct = (netNewMrr - priorNetMrr) / Math.abs(priorNetMrr) * 100;

      // staleness: latest snapshot older than 2 days => warn
      let staleHtml = "";
      const todayKey = new Date().toISOString().slice(0,10);
      const daysBehind = Math.round((Date.parse(todayKey) - Date.parse(latest.date)) / 86400000);
      if (daysBehind >= 2) {
        staleHtml = '<div class="pf-stale">⚠ Latest snapshot is ' + latest.date + ' (' + daysBehind + ' days behind). Daily job may not have run.</div>';
      }

      const rangeBtns = [7,30,60,90].map(r =>
        '<button class="pf-range-btn ' + (r===mrrRange?"active":"") + '" onclick="setMrrRange('+r+')">'+r+'D</button>'
      ).join("");

      // Per-app momentum: for each app, its MRR series across the current window → sparkline + delta.
      const perApp = latest.per_app || {};
      const appIds = Object.keys(perApp).filter(id => (Number(perApp[id])||0) > 0);
      const appRows = appIds.map(id => {
        const series = curWin.map(r => Number((r.per_app||{})[id])||0);
        const cur = Number(perApp[id])||0;
        const first = series.find(v => v > 0) || series[0] || 0; // first nonzero (app may launch mid-window)
        const dPct = first > 0 ? (cur - first)/first*100 : (cur > 0 ? 100 : 0);
        return { id, name: APP_NAMES[id] || ("App "+id), mrr: cur, arr: cur*12, series, dPct };
      }).sort((a,b) => b.mrr - a.mrr);

      const sparkSvg = (series) => {
        if (!series.length) return "";
        const mn = Math.min(...series), mx = Math.max(...series), sp = (mx-mn)||1;
        const W=120, H=26, pad=3;
        const xs = i => (series.length<=1?W/2:(i/(series.length-1))*W);
        const ys = v => pad + (H-2*pad) - ((v-mn)/sp)*(H-2*pad);
        let d=""; series.forEach((v,i)=>{ d += (i===0?"M":"L")+xs(i).toFixed(1)+" "+ys(v).toFixed(1)+" "; });
        const up = series[series.length-1] >= (series.find(v=>v>0)||series[0]||0);
        const flat = Math.abs(series[series.length-1] - (series.find(v=>v>0)||series[0]||0)) < 0.01;
        const col = flat ? "#666" : (up ? "#4ade80" : "#f87171");
        return '<svg class="pf-spark" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/></svg>';
      };
      const deltaCls = (p) => Math.abs(p) < 1 ? "flat" : (p > 0 ? "up" : "down");
      const deltaSym = (p) => Math.abs(p) < 1 ? "—" : (p > 0 ? "▲" : "▼");
      const appsHtml = appRows.map(a => {
        const share = curMrr ? (a.mrr/curMrr*100) : 0;
        return '<tr>' +
          '<td class="pf-t-app">'+a.name+'</td>' +
          '<td class="pf-t-spark">'+sparkSvg(a.series)+'</td>' +
          '<td class="pf-t-num r">'+fmtMoney(a.mrr)+'</td>' +
          '<td class="pf-t-num r dim">'+fmtMoney(a.arr)+'</td>' +
          '<td class="pf-t-num r dim">'+share.toFixed(0)+'%</td>' +
          '<td class="r"><span class="pf-t-delta '+deltaCls(a.dPct)+'">'+deltaSym(a.dPct)+' '+Math.abs(Math.round(a.dPct))+'%</span></td>' +
        '</tr>';
      }).join("");

      const chart = buildMrrChart(pts, 900, 260);

      const vsPriorHtml = vsPriorPct != null
        ? '<span class="pf-vs '+(vsPriorPct>=0?"up":"down")+'">'+(vsPriorPct>=0?"▲":"▼")+' '+Math.abs(Math.round(vsPriorPct))+'% vs prior '+mrrRange+'d</span>'
        : '<span class="pf-vs dim">no prior '+mrrRange+'d</span>';

      container.innerHTML =
        staleHtml +
        '<div class="pf-head">' +
          '<div class="pf-big">' +
            '<div class="pf-metric"><div class="pf-m-label">Monthly Recurring Revenue</div>' +
              '<div class="pf-m-value mrr">'+fmtMoney(curMrr)+'</div>' +
              '<div class="pf-m-sub '+netDir+'">'+netArrow+' '+(netNewMrr>=0?"+":"−")+fmtMoney(Math.abs(netNewMrr))+' net new · '+mrrRange+'d</div>' +
            '</div>' +
            '<div class="pf-metric"><div class="pf-m-label">Annual Recurring Revenue</div>' +
              '<div class="pf-m-value">'+fmtMoney(curArr)+'</div>' +
              '<div class="pf-m-sub '+netDir+'">'+netArrow+' '+(netNewArr>=0?"+":"−")+fmtMoney(Math.abs(netNewArr))+' net new · '+mrrRange+'d</div>' +
            '</div>' +
            '<div class="pf-metric"><div class="pf-m-label">Momentum</div>' +
              '<div class="pf-m-value plain" style="font-size:26px">'+vsPriorHtml+'</div>' +
              '<div class="pf-m-sub dim">as of '+latest.date+(latest.incomplete?" · partial":"")+'</div>' +
            '</div>' +
          '</div>' +
          '<div class="pf-ranges">'+rangeBtns+'</div>' +
        '</div>' +
        '<div class="pf-legend"><span class="pf-lg"><i class="sw-mrr"></i>MRR</span><span class="pf-lg"><i class="sw-arr"></i>ARR ×12</span></div>' +
        '<div class="pf-chart-wrap" id="pfChartWrap">'+chart+'<div class="pf-tip" id="pfTip"></div></div>' +
        '<div class="pf-apps"><h3>By app · '+latest.date+'</h3>' +
          '<table class="pf-table"><thead><tr>' +
            '<th>App</th><th>Trend · '+mrrRange+'d</th><th class="r">MRR</th><th class="r">ARR</th><th class="r">Share</th><th class="r">Δ '+mrrRange+'d</th>' +
          '</tr></thead><tbody>'+appsHtml+'</tbody></table>' +
        '</div>';

      // wire chart hover
      const wrap = document.getElementById("pfChartWrap");
      const tip = document.getElementById("pfTip");
      const svg = wrap.querySelector("svg");
      wrap.querySelectorAll(".pf-hit").forEach(hit => {
        hit.addEventListener("mouseenter", () => {
          const i = hit.dataset.i;
          const dot = wrap.querySelector('.pf-dot[data-i="'+i+'"]');
          if (dot) dot.setAttribute("opacity","1");
          const mrr = Number(hit.dataset.mrr);
          const arr = Number(hit.dataset.arr) || mrr*12;
          // convert svg coords to px within wrap
          const vb = svg.viewBox.baseVal;
          const rect = svg.getBoundingClientRect();
          const px = (Number(hit.dataset.x)/vb.width)*rect.width;
          const py = (Number(hit.dataset.y)/vb.height)*rect.height;
          tip.style.left = px + "px";
          tip.style.top = py + "px";
          tip.innerHTML = '<div class="t-date">'+fmtDayMon(hit.dataset.date)+'</div><div class="t-mrr">'+fmtMoney(mrr)+' MRR</div><div class="t-arr">'+fmtMoney(arr)+' ARR</div>';
          tip.style.opacity = "1";
        });
        hit.addEventListener("mouseleave", () => {
          const i = hit.dataset.i;
          const dot = wrap.querySelector('.pf-dot[data-i="'+i+'"]');
          if (dot) dot.setAttribute("opacity","0");
          tip.style.opacity = "0";
        });
      });
    }

    // ---- Churn (cancellation cohorts) ----
    // Data read from Firestore churn_cohorts/{appId}__{plan}, precomputed daily by the
    // dashboard routine (which calls the churnCohorts function). No function call here.
    // Apps with meaningful sub volume, ordered by size. id → label.
    const CHURN_APPS = [
      ["32830","GirlWalk"],["22372","GirlTalk"],["35269","Poly AI"],
    ];
    // Bucket definitions: key, label, color.
    const CHURN_BUCKETS = [
      { key:"d0",      label:"Day 0",     color:"#f87171" },
      { key:"d1_7",    label:"Days 1–7",  color:"#fb923c" },
      { key:"d8_30",   label:"Days 8–30", color:"#fbbf24" },
      { key:"d30plus", label:"Day 30+",   color:"#4ade80" },
    ];
    const CHURN_WINDOWS = [30, 60, 90, 0]; // 0 = All
    let churnWindow = 60;                  // default weeks shown ≈ 60 days
    window.setChurnWindow = function(w) { churnWindow = w; renderChurn(); };
    const CHURN_PLANS = [["all","All"],["weekly","Weekly"],["annual","Annual"]];
    let churnPlan = "all";
    window.setChurnPlan = function(p) { churnPlan = p; renderChurn(); loadChurn(); };
    let churnApp = "32830";
    let churnData = {};      // "appId|plan" → { cohorts, ... }
    let churnInflight = {};   // "appId|plan" → true while its fetch is running
    let churnError = null;
    window.setChurnApp = function(id) { churnApp = id; renderChurn(); loadChurn(); };
    function churnKey() { return churnApp + "|" + churnPlan; }

    // Cohorts are precomputed daily (the MRR routine calls churnCohorts and stores
    // the JSON in Firestore churn_cohorts/{appId}__{plan}). We read that doc directly
    // — no Cloud Function on page load, so N refreshes = N cheap Firestore reads of
    // the same doc, zero ClickHouse queries.
    async function loadChurn() {
      const key = churnKey();            // capture — app/plan may change mid-fetch
      if (churnInflight[key]) return;    // already loading; else always refetch (cheap Firestore read) so new days show without a hard refresh
      churnInflight[key] = true; churnError = null;
      try {
        const snap = await getDoc(doc(db, "churn_cohorts", churnApp + "__" + churnPlan));
        if (!snap.exists()) throw new Error("no data yet for this app/plan");
        churnData[key] = JSON.parse(snap.data().payload);
      } catch (e) {
        console.warn("churn load failed", e);
        churnError = e.message;
      } finally {
        delete churnInflight[key];
        if (section === "churn") renderChurn();
      }
    }

    function buildChurnChart(cohorts, w, h) {
      const padL = 40, padR = 14, padT = 14, padB = 26;
      const iw = w - padL - padR, ih = h - padT - padB;
      const n = cohorts.length;
      // y max = max non-null bucket value across all cohorts (with headroom)
      let maxV = 0;
      cohorts.forEach(c => CHURN_BUCKETS.forEach(b => { const v=c[b.key]; if (v!=null && v>maxV) maxV=v; }));
      const hi = Math.max(5, Math.ceil(maxV/5)*5 + 5);
      const x = i => padL + (n<=1 ? iw/2 : (i/(n-1))*iw);
      const y = v => padT + ih - (v/hi)*ih;

      // gridlines + y labels (%)
      let grid = "";
      for (let g=0; g<=4; g++) {
        const gv = hi*g/4, gy = y(gv).toFixed(1);
        grid += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#1f1f1f" stroke-width="1"/>';
        grid += '<text x="'+(padL-6)+'" y="'+(Number(gy)+3)+'" fill="#555" font-size="9" text-anchor="end">'+gv.toFixed(0)+'%</text>';
      }
      // x labels: first, mid, last cohort week (shared "1 Jun" format with Revenue)
      let xlab = "";
      const xIdx = n>2 ? [0, Math.floor(n/2), n-1] : cohorts.map((_,i)=>i);
      xIdx.forEach(i => { xlab += '<text x="'+x(i).toFixed(1)+'" y="'+(h-7)+'" fill="#666" font-size="9" text-anchor="middle">'+fmtDayMon(cohorts[i].week)+'</text>'; });

      // one polyline per bucket; break where value is null (immature)
      let lines = "";
      CHURN_BUCKETS.forEach(b => {
        let d = "", pendingMove = true;
        cohorts.forEach((c,i) => {
          const v = c[b.key];
          if (v == null) { pendingMove = true; return; }
          d += (pendingMove ? "M" : "L") + x(i).toFixed(1) + " " + y(v).toFixed(1) + " ";
          pendingMove = false;
        });
        if (d) lines += '<path d="'+d+'" fill="none" stroke="'+b.color+'" stroke-width="2" stroke-linejoin="round"/>';
        for (let i=n-1;i>=0;i--){ if(c_at(cohorts,i,b.key)!=null){ lines += '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(cohorts[i][b.key]).toFixed(1)+'" r="2.5" fill="'+b.color+'"/>'; break; } }
      });
      // per-cohort hover: dots on every bucket + a vertical guide + a hit rect
      let hover = "";
      cohorts.forEach((c,i) => {
        const cx = x(i).toFixed(1);
        let dots = '<line class="ch-guide" x1="'+cx+'" y1="'+padT+'" x2="'+cx+'" y2="'+(padT+ih)+'" stroke="#3a3a3a" stroke-width="1" opacity="0"/>';
        CHURN_BUCKETS.forEach(b => {
          const v = c[b.key];
          if (v == null) return;
          dots += '<circle class="ch-hd" cx="'+cx+'" cy="'+y(v).toFixed(1)+'" r="3.5" fill="'+b.color+'" opacity="0"/>';
        });
        hover += '<g class="ch-hg" data-i="'+i+'">'+dots+'</g>';
        const bw = iw/Math.max(n,1);
        hover += '<rect class="ch-hit" data-i="'+i+'" data-x="'+cx+'" x="'+(x(i)-bw/2).toFixed(1)+'" y="'+padT+'" width="'+bw.toFixed(1)+'" height="'+ih+'" fill="transparent"/>';
      });
      return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+grid+xlab+lines+hover+'</svg>';
    }
    function c_at(cohorts,i,key){ return cohorts[i] ? cohorts[i][key] : null; }

    function renderChurn() {
      const container = document.getElementById("container");

      if (!d) { container.innerHTML = header + '<div class="loading">Loading cohorts…</div>'; return; }
      let cohorts = (d.cohorts||[]).filter(c => c.size > 0);
      // window filter: keep cohorts whose start is within N days of today (0 = all)
      if (churnWindow > 0) {
        const cutoff = Date.now() - churnWindow*86400000;
        cohorts = cohorts.filter(c => Date.parse(c.week + "T00:00:00Z") >= cutoff);
      }
      if (!cohorts.length) { container.innerHTML = header + '<div class="empty-state"><h2>No cohorts</h2><p>No subscriptions in this window.</p></div>'; return; }

      const legend = '<div class="ch-legend">' + CHURN_BUCKETS.map(b =>
        '<span class="ch-lg"><i style="background:'+b.color+'"></i>'+b.label+'</span>').join("") + '</div>';
      const chart = buildChurnChart(cohorts, 900, 300);

      // dynamic heat scale: max bucket value + max total across visible cohorts (min floor so a flat table still shows contrast)
      let cellMax = 0, totMax = 0;
      cohorts.forEach(c => {
        let t = 0;
        CHURN_BUCKETS.forEach(b => { const v=c[b.key]; if (v!=null) { if (v>cellMax) cellMax=v; t+=v; } });
        if (t>totMax) totMax=t;
      });
      cellMax = Math.max(cellMax, 5); totMax = Math.max(totMax, 5);
      const rows = cohorts.slice().reverse().map(c => {
        const mat = c.mature || {};
        const known = CHURN_BUCKETS.map(b=>c[b.key]).filter(v=>v!=null);
        const total = known.reduce((s,v)=>s+v,0);
        // total is partial if any shown bucket hasn't matured yet
        const totPartial = CHURN_BUCKETS.some(b => c[b.key]!=null && mat[b.key]===false);
        const cells = CHURN_BUCKETS.map(b => heatTd(c[b.key], cellMax, "", mat[b.key]===false)).join("");
        return '<tr><td class="pf-t-app">'+c.week+'</td><td class="pf-t-num r dim">'+c.size+'</td>'+cells+heatTd(total, totMax, "heat-total", totPartial)+'</tr>';

      // wire hover

    async function loadRefunds() {

    function buildRefundChart(cohorts, w, h) {
      const padL = 40, padR = 14, padT = 14, padB = 26;
      const iw = w - padL - padR, ih = h - padT - padB;
      const n = cohorts.length;
      let maxV = 0;
      cohorts.forEach(c => REFUND_BUCKETS.forEach(b => { const v=rfVal(c,b.key); if (v!=null && v>maxV) maxV=v; }));
      const hi = Math.max(5, Math.ceil(maxV/5)*5 + 5);
      const x = i => padL + (n<=1 ? iw/2 : (i/(n-1))*iw);
      const y = v => padT + ih - (v/hi)*ih;

      let grid = "";
      for (let g=0; g<=4; g++) {
        const gv = hi*g/4, gy = y(gv).toFixed(1);
        grid += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="#1f1f1f" stroke-width="1"/>';
        grid += '<text x="'+(padL-6)+'" y="'+(Number(gy)+3)+'" fill="#555" font-size="9" text-anchor="end">'+gv.toFixed(0)+'%</text>';
      }
      let xlab = "";
      const xIdx = n>2 ? [0, Math.floor(n/2), n-1] : cohorts.map((_,i)=>i);
      xIdx.forEach(i => { xlab += '<text x="'+x(i).toFixed(1)+'" y="'+(h-7)+'" fill="#666" font-size="9" text-anchor="middle">'+fmtDayMon(cohorts[i].week)+'</text>'; });

      let lines = "";
      REFUND_BUCKETS.forEach(b => {
        let d = "", pendingMove = true;
        cohorts.forEach((c,i) => {
          const v = rfVal(c,b.key);
          if (v == null) { pendingMove = true; return; }
          d += (pendingMove ? "M" : "L") + x(i).toFixed(1) + " " + y(v).toFixed(1) + " ";
          pendingMove = false;
        });
        if (d) lines += '<path d="'+d+'" fill="none" stroke="'+b.color+'" stroke-width="2" stroke-linejoin="round"/>';
        for (let i=n-1;i>=0;i--){ const v=rfVal(cohorts[i],b.key); if(v!=null){ lines += '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(v).toFixed(1)+'" r="2.5" fill="'+b.color+'"/>'; break; } }
      });
      let hover = "";
      cohorts.forEach((c,i) => {
        const cx = x(i).toFixed(1);
        let dots = '<line class="ch-guide" x1="'+cx+'" y1="'+padT+'" x2="'+cx+'" y2="'+(padT+ih)+'" stroke="#3a3a3a" stroke-width="1" opacity="0"/>';

          const v = rfVal(c,b.key);

        });

        const bw = iw/Math.max(n,1);
        hover += '<rect class="ch-hit" data-i="'+i+'" data-x="'+cx+'" x="'+(x(i)-bw/2).toFixed(1)+'" y="'+padT+'" width="'+bw.toFixed(1)+'" height="'+ih+'" fill="transparent"/>';
      });
      return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+grid+xlab+lines+hover+'</svg>';
    }

    // ---- ROAS (cohort-vaulted return on ad spend) ----
    // Each spend-day's ROAS = future proceeds from that day's buyers ÷ spend that day.
    // Backend writes RAW DOLLARS per day (proceeds cumulative at D0/D7/D30/D90 + spend
    // + age) into roas_cohorts/{appId}; the client filters by range, buckets into
    // day/week/month, and computes ROAS % = sum(proceeds)/sum(spend)×100 per bucket.
    // Ratios are always from summed dollars, never averaged per-day ratios.
    const ROAS_APPS = [["32830","GirlWalk"],["22372","GirlTalk"],["35269","Poly AI"]];
    const ROAS_RANGES = [30, 60, 90, 180, 0]; // 0 = All
    const ROAS_GEOS = [["all","All"],["US","US"],["GB","UK"]];
    let roasApp = "32830";
    let roasGeo = "all";
    let roasRange = 90;
    let roasGran = "day";   // day | week | month
    let roasShowRefunds = true;
    let roasData = {};      // "appId__geo" → payload
    let roasInflight = {};  // "appId__geo" → true while loading
    let roasError = null;
    function roasKey() { return roasApp + "__" + roasGeo; }
    window.setRoasApp = function(id) { roasApp = id; renderRoas(); loadRoas(); };
    window.setRoasGeo = function(g) { roasGeo = g; renderRoas(); loadRoas(); };
    window.setRoasRange = function(w) { roasRange = w; renderRoas(); };
    window.setRoasGran = function(g) { roasGran = g; renderRoas(); };
    window.toggleRoasRefunds = function() { roasShowRefunds = !roasShowRefunds; renderRoas(); };

    async function loadRoas() {
      const key = roasKey();
      if (roasInflight[key]) return;     // always refetch on view; only guard against a concurrent load
      roasInflight[key] = true; roasError = null;
      try {
        const snap = await getDoc(doc(db, "roas_cohorts", key));
        if (!snap.exists()) throw new Error("no data yet for this app/geo");
        roasData[key] = JSON.parse(snap.data().payload);
      } catch (e) {
        console.warn("roas load failed", e);
        roasError = e.message;
      } finally {
        delete roasInflight[key];
        if (section === "roas") renderRoas();
      }
    }

    // Color band for a ROAS % : red < 70, orange 70–100, green > 100.
    // null (window not elapsed / no spend) renders as a dim em-dash.
    function roasColor(pct) {
      if (pct == null) return "";
      if (pct < 70) return "#f87171";
      if (pct < 100) return "#fbbf24";
      return "#4ade80";
    }

    // Heatmap for churn/refund tables. Higher % = worse (red), lower = better (green).
    // `t` normalized 0..1 (v / scaleMax). Returns {bg, fg} — translucent tinted bg + readable text.
    // Green (140°) → amber (48°) → red (0°) hue ramp; alpha scales with intensity so
    // near-zero cells stay quiet and hot cells pop.
    function heatColors(t) {
      t = Math.max(0, Math.min(1, t));
      // hue: 0% -> 140 (green), 50% -> 48 (amber), 100% -> 2 (red)
      const hue = t < 0.5 ? 140 - (140 - 48) * (t / 0.5) : 48 - (48 - 2) * ((t - 0.5) / 0.5);
      const alpha = 0.10 + 0.34 * t;                 // 0.10 quiet -> 0.44 hot
      const bg = "hsla(" + hue.toFixed(0) + ",72%,50%," + alpha.toFixed(3) + ")";
      const fg = t > 0.55 ? "#ffe4e0" : t > 0.28 ? "#fde9c8" : "#d6f5df";
      return { bg: bg, fg: fg };
    }
    // Build one heat <td>. v = value (%), scaleMax = table's dynamic max for normalization.
    // partial = window entered but not fully matured -> value shown but styled as still-accruing.
    function heatTd(v, scaleMax, extraClass, partial) {
      if (v == null) return '<td class="pf-t-num heat dim r ' + (extraClass || "") + '"><span class="hcell">—</span></td>';
      const c = heatColors(scaleMax > 0 ? v / scaleMax : 0);
      const cls = "pf-t-num heat r " + (extraClass || "") + (partial ? " partial" : "");
      const tip = partial ? ' title="Still accruing — this cohort hasn\'t fully aged through this window yet"' : "";
      return '<td class="' + cls + '"' + tip + '>' +
        '<span class="hcell" style="background:' + c.bg + ';color:' + c.fg + '">' + v.toFixed(1) + '%</span></td>';
    }
    function roasCell(pct, strong) {
      if (pct == null) return '<td class="pf-t-num r dim">—</td>';
      return '<td class="pf-t-num r" style="color:'+roasColor(pct)+(strong?';font-weight:600':'')+'">'+Math.round(pct)+'%</td>';
    }

    // Bucket key + label for a YYYY-MM-DD day at the chosen granularity.
    // Week = ISO-ish Monday start (matches churn/refund weekly convention).
    function roasBucket(dayStr, gran) {
      const p = dayStr.split("-").map(Number);
      const dt = new Date(Date.UTC(p[0], p[1]-1, p[2]));
      if (gran === "month") {
        const key = p[0]+"-"+String(p[1]).padStart(2,"0");
        return { key, label: MON[p[1]-1] + " " + p[0] };
      }
      if (gran === "week") {
        const dow = (dt.getUTCDay() + 6) % 7; // Mon=0
        dt.setUTCDate(dt.getUTCDate() - dow);
        const wk = dt.toISOString().slice(0,10);
        return { key: wk, label: "Week of " + fmtDayMon(wk) };
      }
      return { key: dayStr, label: fmtDayMon(dayStr) };
    }

    // Aggregate raw-dollar day rows into buckets. Each bucket sums spend + proceeds
    // per milestone; ROAS % = proceeds/spend×100. A milestone is gated (null) unless
    // EVERY day in the bucket has aged past it (so a week's D7 needs the whole week
    // ≥7d old). Days with no spend are excluded from that bucket's spend/ratios but
    // still counted in buyers.
    // Milestone ages we store raw proceeds for (backend p0/p7/.../p90).
    const ROAS_MILESTONES = [0, 7, 14, 30, 45, 60, 90];
    function roasAggregate(rows, gran) {
      const buckets = new Map(); // key → agg
      for (const r of rows) {
        const b = roasBucket(r.day, gran);
        let a = buckets.get(b.key);
        if (!a) { a = { key:b.key, label:b.label, spend:0, hasSpend:false, buyers:0,
          p:{0:0,7:0,14:0,30:0,45:0,60:0,90:0}, pLife:0, refunds:0, minAge:Infinity,
          curveByAge:{}, cohortStart:r.day }; buckets.set(b.key, a); }
        a.buyers += r.buyers;
        a.minAge = Math.min(a.minAge, r.ageDays);
        if (r.day < a.cohortStart) a.cohortStart = r.day; // earliest cohort-day in bucket
        a.refunds += (r.refunds || 0); // refunds tracked even for days with no spend
        if (r.spend != null) {
          a.spend += r.spend; a.hasSpend = true;
          ROAS_MILESTONES.forEach(m => { a.p[m] += (r["p"+m] || 0); });
          a.pLife += r.proceeds;
          // merge per-age net curve (age relative to each cohort-day; summed by age)
          (r.curve || []).forEach(pt => { const age = pt[0]; a.curveByAge[age] = (a.curveByAge[age] || 0) + pt[1]; });
        }
      }
      const out = [...buckets.values()];
      out.sort((x,y) => x.key < y.key ? 1 : -1); // newest first
      for (const a of out) {
        // ROAS % at milestone m: null if no spend, or bucket not fully aged past m.
        a.dx = (m) => {
          if (!a.hasSpend || a.spend <= 0) return null;
          if (a.minAge < m) return null;
          return (a.p[m] / a.spend) * 100;
        };
        a.d0 = a.dx(0); a.d7 = a.dx(7); a.d30 = a.dx(30); a.d90 = a.dx(90);
        a.now = a.hasSpend && a.spend > 0 ? (a.pLife / a.spend) * 100 : null;
      }
      return out;
    }

    // SVG chart: one line per Dx maturity (D0/D7/D14/D30) across cohort buckets,
    // Exact break-even per cohort bucket, from the merged per-age net curve:
    // running-sum net proceeds by age; the first age where cumulative ≥ bucket
    // spend is the exact break-even age. Break-even DATE = earliest cohort-day in
    // the bucket + that age. Returns:
    //   undefined → no spend (not plottable)
    //   null      → not paid back yet (cumulative never reached spend)
    //   { age, date } → exact break-even age (days) + ISO date string
    function roasBreakEven(b) {
      if (!b.hasSpend || b.spend <= 0) return undefined;
      const ages = Object.keys(b.curveByAge).map(Number).sort((x,y) => x-y);
      let cum = 0;
      for (const age of ages) {
        cum += b.curveByAge[age];
        if (cum >= b.spend) {
          const dt = new Date(b.cohortStart + "T00:00:00Z");
          dt.setUTCDate(dt.getUTCDate() + age);
          return { age, date: dt.toISOString().slice(0,10) };
        }
      }
      return null; // never crossed → not paid back
    }

    function renderRoas() {
      const container = document.getElementById("container");
      const appBtns = ROAS_APPS.map(([id,name]) =>
        '<button class="filter-btn '+(id===roasApp?"active":"")+'" onclick="setRoasApp(\''+id+'\')">'+name+'</button>'
      ).join("");

      const d = roasData[roasKey()];

      const header =

            '<div class="pf-m-label">Blended ROAS now</div><div class="pf-m-value" style="font-size:26px;color:'+(blended==null?"#fff":roasColor(blended))+'">'+(blended==null?"—":Math.round(blended)+"%")+'</div></div>' +
        '</div>';

      const bodyRows = buckets.map(b => {
        const spendCell = !b.hasSpend ? '<td class="pf-t-num r dim">—</td>' : '<td class="pf-t-num r">'+fmtMoney(b.spend)+'</td>';
        const procCell = !b.hasSpend ? '<td class="pf-t-num r dim">—</td>' : '<td class="pf-t-num r">'+fmtMoney(b.pLife)+'</td>';
        const refCell = !roasShowRefunds ? '' : (b.refunds > 0 ? '<td class="pf-t-num r" style="color:#f87171">-'+fmtMoney(b.refunds)+'</td>' : '<td class="pf-t-num r dim">—</td>');
        const be = roasBreakEven(b);
        const beCell = be===undefined ? '<td class="pf-t-num r dim">—</td>'
          : be===null ? '<td class="pf-t-num r" style="color:#f87171">not yet</td>'
          : '<td class="pf-t-num r" style="color:#4ade80">D'+be.age+'</td>';
        return '<tr><td class="pf-t-app">'+b.label+'</td>'+spendCell+procCell+refCell+
          roasCell(b.d0)+roasCell(b.d7)+roasCell(b.d30)+roasCell(b.d90)+roasCell(b.now,true)+beCell+'</tr>';
      }).join("");

      const legend = '<div class="ch-legend">' +
        '<span class="ch-lg"><i style="background:#f87171"></i>&lt; 70% underwater</span>' +
        '<span class="ch-lg"><i style="background:#fbbf24"></i>70–100%</span>' +
        '<span class="ch-lg"><i style="background:#4ade80"></i>&gt; 100% profitable</span>' +
        '<span class="ch-lg"><i style="background:#333"></i>— not matured / no spend</span></div>';

      const periodCol = roasGran === "month" ? "Month" : roasGran === "week" ? "Week" : "Spend day";
      const table = '<div class="pf-apps"><h3>By '+(roasGran==="day"?"spend day":roasGran)+'</h3><table class="pf-table"><thead><tr>' +
        '<th>'+periodCol+'</th><th class="r">Spend</th><th class="r">Proceeds</th>'+(roasShowRefunds?'<th class="r">Refunds</th>':'') +
        '<th class="r">D0</th><th class="r">D7</th><th class="r">D30</th><th class="r">D90</th><th class="r">ROAS now</th><th class="r">Break-even</th>' +
        '</tr></thead><tbody>'+bodyRows+'</tbody></table>' +
        '<div class="ch-foot">ROAS % = proceeds (net of store cut) ÷ ad spend. Cohort = first paid day per subscription, in '+(d.tz||"account")+' time. Break-even = exact date cumulative proceeds first covered spend (running-summed from per-day events). Refunds subtract from their original cohort.</div></div>';

      container.innerHTML = header + tiles + table;
    }

    // ========================= pROAS (projection) tab =========================
    // Consumes proas_cohorts docs (install-day cohorts, plan split + sub counts + churn signals),
    // reuses roasBucket for the same day/week/month grain, and projects each cohort's revenue to
    // 1 year: observed proceeds + weekly renewal tail (survival curve) + annual renewal (auto-renew
    // -off intent × 20% billing). Observed ROAS here == ROAS tab (same net proceeds). Model is
    // client-side so it can be tuned without redeploying.
    const PROAS_APPS = ROAS_APPS, PROAS_GEOS = ROAS_GEOS, PROAS_RANGES = ROAS_RANGES;
    let proasApp = "32830", proasGeo = "all", proasRange = 0, proasGran = "week";
    let proasData = {}, proasInflight = {}, proasError = null, proasSelected = null;
    function proasKey() { return proasApp + "__" + proasGeo; }
    window.setProasApp = function(id){ proasApp=id; proasSelected=null; renderProas(); loadProas(); };
    window.setProasGeo = function(g){ proasGeo=g; proasSelected=null; renderProas(); loadProas(); };
    window.setProasGran = function(g){ proasGran=g; proasSelected=null; renderProas(); };
    window.selectProas = function(k){ proasSelected=k; renderProas(); };

    async function loadProas(){
      const key = proasKey();
      if (proasInflight[key]) return;
      proasInflight[key] = true; proasError = null;
      try {
        const snap = await getDoc(doc(db, "proas_cohorts", key));
        if (!snap.exists()) throw new Error("no pROAS data yet for this app/geo");
        proasData[key] = JSON.parse(snap.data().payload);
      } catch(e){ console.warn("proas load failed", e); proasError = e.message; }
      finally { delete proasInflight[key]; if (section==="proas") renderProas(); }
    }

    // --- projection model (from the pROAS analysis; GirlWalk-calibrated) ---
    const WK_SURVIVAL = [1.000,0.554,0.401,0.323,0.248,0.222,0.196,0.166,0.135,0.118,0.100,0.096,
      0.092,0.092,0.092,0.092,0.092,0.084,0.075,0.067,0.059,0.057,0.055,0.053,0.051,0.049,0.047,0.045,
      0.043,0.042,0.041,0.040,0.039,0.038,0.037,0.036,0.035,0.034,0.033,0.032,0.031,0.030,0.029,0.028,
      0.028,0.028,0.028,0.028,0.028,0.028,0.028,0.028,0.028];
    const WK_HORIZON = 52, WK_PRICE = 6.32, WK_BASE_WK1 = 0.554;
    const ANNUAL_UNSUB = (()=>{ const real={0:.662,1:.683,2:.710,4:.736,6:.763,8:.762,12:.782,16:.820,20:.894};
      const a=[]; const ks=Object.keys(real).map(Number);
      for(let w=0;w<=52;w++){ if(real[w]!=null){a[w]=real[w];continue;}
        if(w<20){const lo=Math.max(...ks.filter(k=>k<w)),hi=Math.min(...ks.filter(k=>k>w));a[w]=real[lo]+(real[hi]-real[lo])*(w-lo)/(hi-lo);}
        else a[w]=a[w-1]+(0.95-a[w-1])*0.04; } return a; })();
    const ANNUAL_UNSUB_WK52 = ANNUAL_UNSUB[52], BILLING_DISCOUNT = 0.20;

    // Aggregate proas rows into buckets (reuse roasBucket for identical grain), summing the
    // projection inputs. Then project each bucket to 1 year.
    function proasAggregate(rows, gran){
      const m = new Map();
      for (const r of rows){
        const b = roasBucket(r.day, gran);
        let a = m.get(b.key);
        if(!a){ a={ key:b.key, label:b.label, spend:0, hasSpend:false, weekly_p:0, annual_p:0,
          weekly_subs:0, weekly_alive:0, annual_subs:0, annual_on:0, minAge:Infinity, sumAgeWk:0, nDays:0 }; m.set(b.key,a); }
        a.weekly_p += r.weekly_p||0; a.annual_p += r.annual_p||0;
        a.weekly_subs += r.weekly_subs||0; a.weekly_alive += r.weekly_alive||0;
        a.annual_subs += r.annual_subs||0; a.annual_on += r.annual_on||0;
        a.minAge = Math.min(a.minAge, r.ageDays); a.sumAgeWk += r.ageDays/7; a.nDays++;
        if (r.spend != null){ a.spend += r.spend; a.hasSpend = true; }
      }
      const out=[...m.values()].sort((x,y)=>x.key<y.key?1:-1);
      for(const a of out) projectBucket(a);
      return out;
    }

    // Project one bucket to a 1-year value + weekly cumulative-ROAS series.
    function projectBucket(a){
      const actual = a.weekly_p + a.annual_p;
      const ageWk = Math.max(0, Math.round(a.minAge/7)); // representative age = youngest cohort day
      // Weekly retention lift is kept neutral (1.0) here: the proas doc emits alive-now share, not a
      // clean week-1 retention read, so we don't infer a lift server-side. The base survival curve
      // applies. (Future: emit per-cohort wk1 survival to enable the product-update lift.)
      const lift = 1.0;
      const sNow = WK_SURVIVAL[Math.min(ageWk, WK_HORIZON)] || 0.028;
      // build weekly incremental series
      const inc = new Array(WK_HORIZON+1).fill(0);
      inc[0] += a.annual_p;
      const obsCap = Math.min(ageWk, WK_HORIZON), nB = obsCap+1;
      for(let w=0; w<=obsCap; w++) inc[w] += a.weekly_p/nB;
      if (a.weekly_alive>0 && sNow>0){
        for(let w=ageWk+1; w<=WK_HORIZON; w++){
          const fFwd = Math.pow(Math.min(1,(WK_SURVIVAL[w]||0)/sNow), 1/lift);
          inc[w] += a.weekly_alive * WK_PRICE * fFwd;
        }
      }
      // annual renewal rate: (1 - projected unsub@wk52) × (1 - billing). anchor-and-scale on observed.
      const aw = Math.min(52, Math.max(1, ageWk));
      const obsUnsub = a.annual_subs>0 ? 1 - (a.annual_on/a.annual_subs) : null;
      const pooledNow = ANNUAL_UNSUB[aw] || ANNUAL_UNSUB_WK52;
      let ratio = 1.0;
      if (obsUnsub != null && pooledNow>0 && aw>=4) ratio = Math.max(0.85, Math.min(1.1, obsUnsub/pooledNow));
      const unsub52 = Math.min(0.97, ANNUAL_UNSUB_WK52 * ratio);
      const annualRate = Math.max(0, (1-unsub52)*(1-BILLING_DISCOUNT));
      const annualRenew = a.annual_p * annualRate;
      inc[WK_HORIZON] += annualRenew;

      let run=0; const cum=[];
      for(let w=0;w<=WK_HORIZON;w++){ run+=inc[w]; cum.push(run); }
      let splitWk = Math.min(WK_HORIZON, ageWk);
      while (splitWk<WK_HORIZON && cum[splitWk] < actual-1) splitWk++;

      a.actual = actual;
      a.projBase = cum[WK_HORIZON];
      a.weeklyTail = cum[WK_HORIZON] - actual - annualRenew;
      a.annualRenew = annualRenew;
      a.annualRate = annualRate;
      a.cum = cum; a.splitWk = splitWk;
      a.roasNow = a.hasSpend && a.spend>0 ? actual/a.spend : null;
      a.pRoas = a.hasSpend && a.spend>0 ? a.projBase/a.spend : null;
    }
    function pRoasColorPct(r){ return r==null?"":roasColor(r*100); }

    function renderProas(){
      const container = document.getElementById("container");
      const appBtns = PROAS_APPS.map(([id,name]) => '<button class="filter-btn '+(id===proasApp?"active":"")+'" onclick="setProasApp(\''+id+'\')">'+name+'</button>').join("");
      const geoBtns = PROAS_GEOS.map(([g,name]) => '<button class="pf-range-btn '+(g===proasGeo?"active":"")+'" onclick="setProasGeo(\''+g+'\')">'+name+'</button>').join("");

      const d = proasData[proasKey()];

      const header = '<div class="pf-head"><div><div class="pf-m-label">pROAS · projected to 1 year</div>'+
        (synced?'<div class="ch-sub">Synced '+synced+'</div>':'')+'</div>'+

        '<div class="ch-appbar">'+appBtns+'</div>';

      if (proasError && !d) { container.innerHTML = header + '<div class="empty-state"><h2>Couldn’t load pROAS</h2><p>'+proasError+'</p></div>'; return; }
      if (!d) { container.innerHTML = header + '<div class="loading">Loading pROAS…</div>'; return; }

      const buckets = proasAggregate(d.rows||[], proasGran);
      const periodCol = proasGran==="month"?"Month":proasGran==="week"?"Week":"Install day";
      const bodyRows = buckets.map(b => {
        const sel = b.key===proasSelected ? ' style="background:#12352c"' : '';
        return '<tr onclick="selectProas(\''+b.key+'\')" style="cursor:pointer"'+sel+'>'+
          '<td class="pf-t-app">'+b.label+'</td>'+

          '<td class="pf-t-num r">'+fmtMoney(b.projBase)+'</td>'+
          '<td class="pf-t-num r">'+(b.hasSpend?fmtMoney(b.spend):'<span class="dim">—</span>')+'</td>'+
          roasCell(b.roasNow!=null?b.roasNow*100:null)+
          roasCell(b.pRoas!=null?b.pRoas*100:null,true)+'</tr>';
      }).join("");
      const table = '<div class="pf-apps"><h3>By '+(proasGran==="day"?"install day":proasGran)+' · install cohort</h3><table class="pf-table"><thead><tr>'+
        '<th>'+periodCol+'</th><th class="r">Proceeds</th><th class="r">1Y pProceeds</th><th class="r">Spend</th><th class="r">ROAS now</th><th class="r">1Y pROAS</th>'+
        '</tr></thead><tbody>'+bodyRows+'</tbody></table>'+
        '<div class="ch-foot">Observed proceeds = net of refunds, install-day cohort (matches ROAS tab). 1Y projection = weekly renewals (survival curve) + annual renewal (auto-renew-off intent × 20% billing). Annual renewal is modeled from intent — no cohort has reached its 1-yr renewal yet. Click a row for detail.</div></div>';

      // detail panel for selected bucket
      let detail = '';
      const b = buckets.find(x=>x.key===proasSelected);
      if (b){
        const onPct = b.annual_subs>0?Math.round(b.annual_on/b.annual_subs*100):0;
        const aliveP = b.weekly_subs>0?Math.round(b.weekly_alive/b.weekly_subs*100):0;
        const aShare = b.actual>0?Math.round(b.annual_p/(b.weekly_p+b.annual_p)*100):0;
        detail = '<div class="pf-apps" style="margin-top:16px"><h3>'+b.label+' — projection detail</h3>'+
          '<table class="pf-table"><tbody>'+
          '<tr><td class="pf-t-app">Observed proceeds</td><td class="pf-t-num r">'+fmtMoney(b.actual)+'</td></tr>'+
          '<tr><td class="pf-t-app">+ Weekly renewal tail (→wk52)</td><td class="pf-t-num r">'+fmtMoney(b.weeklyTail)+'</td></tr>'+
          '<tr><td class="pf-t-app">+ Annual renewal ('+Math.round(b.annualRate*100)+'% eff.)</td><td class="pf-t-num r">'+fmtMoney(b.annualRenew)+'</td></tr>'+
          '<tr><td class="pf-t-app" style="font-weight:600">Projected value (1yr)</td><td class="pf-t-num r" style="font-weight:600">'+fmtMoney(b.projBase)+'</td></tr>'+
          (b.hasSpend?'<tr><td class="pf-t-app">Spend</td><td class="pf-t-num r">'+fmtMoney(b.spend)+'</td></tr>'+
