    const labels = {
      new_subscription: "New",
      trial_to_paid: "Trial → Paid",
      one_time_purchase: "One-time",
      renewal: "Renewal",
      refund: "Refund"
    };

    function timeAgo(date) {
      const now = new Date(); const diff = (now - date) / 1000;
      if (diff < 60) return Math.floor(diff) + "s";
      if (diff < 3600) return Math.floor(diff / 60) + "m";
      if (diff < 86400) return Math.floor(diff / 3600) + "h";
      return Math.floor(diff / 86400) + "d";
    }
    function formatTime(date) {
      return date.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
    }
    function formatCurrency(price) {
      try { return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", minimumFractionDigits: 2 }).format(price); }
      catch { return "$" + Number(price).toFixed(2); }
    }
    function formatCurrencyCompact(price) {
      const abs = Math.abs(price);
      if (abs >= 1000) return (price < 0 ? "-" : "") + "$" + (abs / 1000).toFixed(abs >= 10000 ? 0 : 1) + "k";
      try { return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(price); }
      catch { return "$" + Math.round(price); }
    }
    function countryToFlag(code) {
      if (!code || code.length !== 2) return "";
      const codePoints = code.toUpperCase().split("").map(c => 127397 + c.charCodeAt(0));
      return String.fromCodePoint(...codePoints);
    }
    function getTxDate(tx) {
      if (tx.received_at?.toDate) return tx.received_at.toDate();
      if (tx.purchased_at_ms) return new Date(tx.purchased_at_ms);
      return new Date(tx.event_timestamp_ms || 0);
    }
    function getDayKey(date) {
      const d = new Date(date); d.setHours(0, 0, 0, 0); return d.getTime();
    }
    function getDayLabel(ts) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      if (ts === today.getTime()) return "Today";
      if (ts === yesterday.getTime()) return "Yesterday";
      return new Date(ts).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
    }
    function summarize(txs) {
      let net = 0, convCount = 0, renewCount = 0, refundCount = 0, refundAbs = 0;
      for (const t of txs) {
        const p = t.price || 0;
        net += p;
        if (t.transaction_type === "renewal") renewCount++;
        else if (t.transaction_type === "refund") { refundCount++; refundAbs += Math.abs(p); }
        else if (CONVERSION_TYPES.has(t.transaction_type)) convCount++;
      }
      return { net, convCount, renewCount, refundCount, refundAbs, total: txs.length };
    }

    function formatPct(v, decimals) {
      if (v === null || v === undefined || Number.isNaN(v)) return "—";
      return Number(v).toFixed(decimals != null ? decimals : 1) + "%";
    }
    function deltaPct(today, yest) {
      if (today == null || yest == null || yest === 0) return null;
      return ((today - yest) / yest) * 100;
    }

    // KPI strip — uses all available txs (not just filtered to today)
    function renderKpis() {
      const now = new Date();
      const today0 = new Date(now); today0.setHours(0, 0, 0, 0);
      const yest0 = new Date(today0); yest0.setDate(yest0.getDate() - 1);
      const mtd0 = new Date(now.getFullYear(), now.getMonth(), 1); mtd0.setHours(0, 0, 0, 0);
      const week0 = new Date(today0); week0.setDate(week0.getDate() - 6); // last 7 days incl today

      const txs = currentApp === "all" ? allTxs : allTxs.filter(t => t.app_name === currentApp);

      let todayNet = 0, todayCount = 0;
      let yestNet = 0;
      let mtdNet = 0;
      let weekConv = 0, weekTrials = 0;  // for trial→paid %
      let weekRevenue = 0, weekRefunds = 0;

      for (const t of txs) {
        const d = getTxDate(t);
        const p = t.price || 0;
        const tt = t.transaction_type;
        if (d >= mtd0) mtdNet += p;
        if (d >= today0) { todayNet += p; todayCount++; }
        else if (d >= yest0 && d < today0) yestNet += p;
        if (d >= week0) {
          if (p > 0) weekRevenue += p;
          if (tt === "refund") weekRefunds += Math.abs(p);
          if (tt === "trial_to_paid") weekConv++;
          // trial starts aren't in dataset (we skip them), so trial→paid % approximated as conv / (conv+expirations). Skip for now.
        }
      }

      // Yesterday-at-this-time comparison (more useful than full-yesterday)
      const yestSameTime = new Date(now); yestSameTime.setDate(yestSameTime.getDate() - 1);
      const yestStart = new Date(yest0);
      let yestToNow = 0;
      for (const t of txs) {
        const d = getTxDate(t);
        if (d >= yestStart && d <= yestSameTime) yestToNow += (t.price || 0);
      }
      const delta = yestToNow > 0 ? ((todayNet - yestToNow) / yestToNow) * 100 : null;
      const refundRate = weekRevenue > 0 ? (weekRefunds / weekRevenue) * 100 : 0;

      const kpi = (label, value, sub, subClass) =>
        '<div class="kpi"><div class="k-label">' + label + '</div>' +
        '<div class="k-value">' + value + '</div>' +
        (sub ? '<div class="k-sub ' + (subClass || '') + '">' + sub + '</div>' : '') + '</div>';

      const primary = '<div class="kpi primary"><div class="k-label">Today</div>' +
        '<div class="k-value">' + formatCurrency(todayNet) + '</div>' +
        '<div class="k-sub">' + todayCount + ' event' + (todayCount !== 1 ? 's' : '') + '</div></div>';

      const vsYest = delta !== null
        ? (delta >= 0 ? '↑ ' : '↓ ') + Math.abs(delta).toFixed(0) + '% vs yest'
        : 'no data yest';
      const vsYestClass = delta === null ? '' : (delta >= 0 ? 'up' : 'down');

      // Superwall KPIs override (5 cards). Falls back to legacy 3 cards if not loaded yet.
      if (swStats && swStats.today) {
        const t = swStats.today, y = swStats.yest || {};
        // For trial-cohort KPIs, "today" actually means today - 3 (cohort lag). Note in subtitle.
        const lag = swStats.trialLagDays || 3;
        function kpiPair(label, todayVal, yestVal, fmt, extra) {
          const dPct = deltaPct(todayVal, yestVal);
          // Direction interpretation: for negative-signal metrics (cancel/billing), down is good
          const negSignal = (label === "Cancellation %" || label === "Billing issue rate");
          const yestStr = yestVal != null && !Number.isNaN(yestVal) ? "y: " + fmt(yestVal) : "y: —";
          const deltaStr = dPct != null
            ? (dPct >= 0 ? " ↑" : " ↓") + Math.abs(dPct).toFixed(0) + "%"
            : "";
          let subClass = "";
          if (dPct != null) {
            const isUp = dPct >= 0;
            subClass = negSignal ? (isUp ? "down" : "up") : (isUp ? "up" : "down");
          }
          const titleAttr = extra ? ' title="' + extra + '"' : '';
          return '<div class="kpi"' + titleAttr + '><div class="k-label">' + label + '</div>' +
            '<div class="k-value">' + fmt(todayVal) + '</div>' +
            '<div class="k-sub ' + subClass + '">' + yestStr + deltaStr + '</div></div>';
        }
        const pct = v => formatPct(v, 1);
        const tc = t.counts || {}, yc = y.counts || {};
        const itpLag = swStats.itpLagDays || 4;
        return '<div class="kpis kpis-2">' +
          kpiPair("Paywall rate", t.paywallRate, y.paywallRate, pct,
            "paywalled_users / new_users (today)\n" + tc.paywalled_users + "/" + tc.new_users) +
          kpiPair("Install to Paid %", t.itpRate, y.itpRate, pct,
            "paid_users / new_users (install cohort " + itpLag + "d ago)\n" + tc.itp_paid_users + "/" + tc.itp_new_users) +
        '</div>';
      }

      // Fallback (during initial load before swStats arrives)
      const loadingNote = swStatsLoading ? '<div class="k-sub">loading…</div>' : '';
      return '<div class="kpis">' +
        primary +
        kpi("vs Yesterday", formatCurrencyCompact(yestToNow), vsYest, vsYestClass) +
        '<div class="kpi"><div class="k-label">Superwall KPIs</div><div class="k-value">…</div>' + loadingNote + '</div>' +
      '</div>';
    }

    function truncateId(id) {
      if (!id) return "";
      return id.length > 24 ? id.slice(-10) : id;
    }

    function renderTx(tx) {
      const type = tx.transaction_type || "unknown";
      const label = labels[type] || type;
      const ts = getTxDate(tx);
      const flag = countryToFlag(tx.country_code);
      const appName = tx.app_name || "Unknown";
      const iconUrl = appIcons[appName];
      const iconHtml = iconUrl
        ? '<img src="' + iconUrl + '" alt="' + appName + '" />'
        : appName.charAt(0);
      const userId = tx.app_user_id || "";
      const idHtml = userId
        ? '<div class="tx-id" onclick="copyTxId(\'' + userId.replace(/'/g, "\\'") + '\', this, event)" title="Click to copy App User ID">' + truncateId(userId) + '</div>'
        : "";
      // Compact info line: trial→paid label (or country flag for renewals where label is redundant)
      const showLabel = type === "trial_to_paid" || type === "new_subscription" || type === "one_time_purchase";
      const subline = (showLabel ? label + ' · ' : '') + (tx.product_id || "—") + (flag ? ' ' + flag : "");
      // Price color by type
      let priceCls = "tx-price";
      if (type === "refund") priceCls += " refund";
      else if (type === "renewal") priceCls += " renewal";
      const cardCls = "tx-card" + (tx.recovered_from_billing ? " recovered" : "");
      // Lifetime-value badge — renewals only, read directly from the doc (eager, stored at webhook).
      let ltvHtml = "";
      if (type === "renewal" && tx.lifetime_spend != null && tx.lifetime_spend > 0) {
        const ltv = Number(tx.lifetime_spend);
        const tier = ltv > 100 ? "tier-whale" : ltv > 50 ? "tier-mid" : "tier-base";
        const icon = ltv > 100 ? "👑 " : ltv > 50 ? "💎 " : "";
        const pays = tx.lifetime_payments != null ? Number(tx.lifetime_payments) + " payments" : "";
        ltvHtml = '<span class="tx-ltv shown ' + tier + '" title="Lifetime: $' + ltv.toFixed(2) + (pays ? ' • ' + pays : '') + '">' +
          icon + '$' + ltv.toFixed(0) + ' LTV</span>';
      }
      const nameLine = '<h3>' + appName + ltvHtml + '</h3>';
      return '<div class="' + cardCls + '" ' + (tx.recovered_from_billing ? 'title="Renewal after billing retry — subscription recovered"' : '') + '>' +
          '<div class="tx-icon">' + iconHtml + '</div>' +
          '<div class="tx-info">' + nameLine + '<p>' + subline + '</p></div>' +
          '<div class="tx-right"><div class="' + priceCls + '">' + formatCurrency(tx.price) + '</div><div class="tx-time">' + formatTime(ts) + ' · ' + timeAgo(ts) + '</div>' + idHtml + '</div>' +
        '</div>';
    }

    function getFilteredTxs() {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      let txs = currentApp === "all" ? allTxs : allTxs.filter(t => t.app_name === currentApp);
      if (viewMode === "live") txs = txs.filter(t => getTxDate(t) >= today);
      return txs;
    }

    function renderColumns(txs) {
      const conv = txs.filter(t => CONVERSION_TYPES.has(t.transaction_type));
      const renew = txs.filter(t => t.transaction_type === "renewal");
      const refund = txs.filter(t => t.transaction_type === "refund");

      const colHtml = (cls, title, items) => {
        const sum = items.reduce((s, t) => s + (t.price || 0), 0);
        const body = items.length
          ? items.map(renderTx).join("")
          : '<div class="empty-col">None today</div>';
        return '<div class="col">' +
          '<div class="col-header">' +
            '<span class="col-title ' + cls + '">' + title + '</span>' +
            '<span class="col-totals"><span class="amt">' + formatCurrency(sum) + '</span><span class="cnt">' + items.length + '</span></span>' +
          '</div>' +
          body +
        '</div>';
      };

      // Hide refund column if zero on slow days (saves space)
      const hideRefunds = refund.length === 0;
      const wrap = hideRefunds ? '<div class="columns no-refunds">' : '<div class="columns">';
      return wrap +
        colHtml("conv", "Conversions", conv) +
        colHtml("renew", "Renewals", renew) +
        (hideRefunds ? "" : colHtml("refund", "Refunds", refund)) +
      '</div>';
    }

    function renderDayHeader(label, txs) {
      const s = summarize(txs);
      const parts = [];
      if (s.convCount) parts.push('<span class="b-conv">' + s.convCount + ' conv</span>');
      if (s.renewCount) parts.push('<span class="b-renew">' + s.renewCount + ' renew</span>');
      if (s.refundCount) parts.push('<span class="b-refund">' + s.refundCount + ' refund</span>');
      const breakdown = parts.length ? '<span class="breakdown">' + parts.join("") + '</span>' : "";
      return '<div class="day-header"><span class="day-label">' + label + '</span>' +
        '<span class="day-summary">' + formatCurrency(s.net) + breakdown + '</span></div>';
    }

    function renderAll() {
      if (section !== "activity") return; // Revenue view owns the container; don't clobber it
      const container = document.getElementById("container");
      const filtered = getFilteredTxs();

      if (viewMode === "live") {
        let html = renderKpis();
        if (filtered.length === 0) {
          html += '<div class="empty-state"><h2>No transactions today</h2><p>Switch to History to see past transactions.</p></div>';
        } else {
          html += renderDayHeader("Today", filtered);
          html += renderColumns(filtered);
        }
        container.innerHTML = html;
        return;
      }

      // History
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><h2>No transactions yet</h2><p>Transactions will appear here as they come in.</p></div>';
        return;
      }
      const groups = {};
      const groupOrder = [];
      filtered.forEach(tx => {
        const key = getDayKey(getTxDate(tx));
        if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
        groups[key].push(tx);
      });
      let html = renderKpis();
      groupOrder.forEach(key => {
        html += renderDayHeader(getDayLabel(key), groups[key]);
        html += renderColumns(groups[key]);
      });
      if (lastDoc && allTxs.length >= PAGE_SIZE) {
        html += '<button class="show-more" id="loadMore">Show more</button>';
      }
      container.innerHTML = html;
      const btn = document.getElementById("loadMore");
      if (btn) btn.addEventListener("click", loadMore);
    }

    function updateFilters() {
      allTxs.forEach(t => {
        if (!t.app_name) return;
        // Hide raw Stripe price IDs — backend bundles new ones as "Stripe Web",
        // but legacy docs may still have the raw price_id as app_name.
        if (/^(live:)?price_/.test(t.app_name)) return;
        knownApps.add(t.app_name);
      });
      const filtersEl = document.getElementById("filters");
      const priority = ["GirlTalk","GirlWalk","Poly AI","Christian Daily Task","Christian Daily Tasks","Christian Music","Christian Music AI"];
      const rank = (a) => {
        const i = priority.indexOf(a);
        return i === -1 ? priority.length : i;
      };
      const apps = Array.from(knownApps).sort((a,b) => {
        const ra = rank(a), rb = rank(b);
        if (ra !== rb) return ra - rb;
        return a.localeCompare(b);
      });
      filtersEl.innerHTML = '<button class="filter-btn ' + (currentApp === "all" ? "active" : "") + '" data-app="all">All</button>' +
        apps.map(a => '<button class="filter-btn ' + (currentApp === a ? "active" : "") + '" data-app="' + a + '">' + a + '</button>').join("");
      filtersEl.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => { currentApp = btn.dataset.app; updateFilters(); renderAll(); fetchSwStats(); });
      });
    }

    const VISIBLE_TYPES_ARR = Array.from(VISIBLE_TYPES);

    async function loadMore() {
      if (!lastDoc) return;
      const q = query(collection(db, "transactions"), where("is_sandbox", "==", false), where("transaction_type", "in", VISIBLE_TYPES_ARR), orderBy("received_at", "desc"), startAfter(lastDoc), limit(PAGE_SIZE));
      const snap = await getDocs(q);
      if (snap.empty) { lastDoc = null; renderAll(); return; }
      snap.forEach(doc => allTxs.push(doc.data()));
      lastDoc = snap.docs[snap.docs.length - 1];
      updateFilters(); renderAll();
    }

    let firstSnapshotDone = false;
    function startListening() {
      const q = query(collection(db, "transactions"), where("is_sandbox", "==", false), where("transaction_type", "in", VISIBLE_TYPES_ARR), orderBy("received_at", "desc"), limit(SNAPSHOT_SIZE));
      onSnapshot(q, (snapshot) => {
        // Detect newly-added docs (skip initial load primer).
        if (firstSnapshotDone) {
          snapshot.docChanges().forEach(ch => {
            if (ch.type === "added") {
              const d = ch.doc.data();
              if (VISIBLE_TYPES.has(d.transaction_type)) fireReward(d);
            }
          });
        }
        firstSnapshotDone = true;

        allTxs = [];
        snapshot.forEach(doc => allTxs.push(doc.data()));
        lastDoc = snapshot.docs.length > 0 ? snapshot.docs[snapshot.docs.length - 1] : null;
        updateFilters(); renderAll();
      }, (err) => {
        console.error("Firestore error:", err);
        document.getElementById("container").innerHTML = '<div class="empty-state"><h2>Connection error</h2><p>' + err.message + '</p></div>';
      });
    }

    function startDashboard() {
      startListening();
      fetchSwStats();
      startSwStatsPolling();
    }

    // Refresh Superwall KPIs every 30min while tab visible, plus once on tab-return.
    // Skips polls when tab hidden (saves ClickHouse queries).
    const SW_POLL_INTERVAL_MS = 30 * 60 * 1000;
    function startSwStatsPolling() {
      setInterval(() => {
        if (document.hidden) return;
        fetchSwStats();
      }, SW_POLL_INTERVAL_MS);
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) fetchSwStats();
      });
    }

    // ============================================================
    // REWARD SYSTEM — visual + audio on new conversion/renewal/refund
    // ============================================================
    let audioCtx = null;
    let soundEnabled = localStorage.getItem("rewardSound") !== "off";

    function getAudioCtx() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }

    // Master compressor for punch + warmth
    function makeMasterChain() {
      const ctx = getAudioCtx();
      if (!ctx) return null;
      if (ctx._master) return ctx._master;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -18;
      comp.knee.value = 12;
      comp.ratio.value = 6;
      comp.attack.value = 0.003;
      comp.release.value = 0.25;
      const master = ctx.createGain();
      master.gain.value = 1.0;
      comp.connect(master).connect(ctx.destination);
      ctx._master = comp;
      return comp;
    }

    // Reverb impulse — synthetic short tail for sparkle
    function getReverb() {
      const ctx = getAudioCtx();
      if (!ctx) return null;
      if (ctx._reverb) return ctx._reverb;
      const len = ctx.sampleRate * 1.2;
      const ir = ctx.createBuffer(2, len, ctx.sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const data = ir.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
        }
      }
      const conv = ctx.createConvolver();
      conv.buffer = ir;
      const wet = ctx.createGain();
      wet.gain.value = 0.25;
      conv.connect(wet);
      ctx._reverb = { input: conv, output: wet };
      return ctx._reverb;
    }

    // White noise burst (for "sssh" sparkle layer)
    function noiseBurst(duration, freqStart, freqEnd, volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.Q.value = 3;
      bp.frequency.setValueAtTime(freqStart, now);
      bp.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      src.connect(bp).connect(gain);
      gain.connect(master);
      if (reverb) gain.connect(reverb.input);
      src.start(now);
      src.stop(now + duration + 0.05);
    }

    // Sub-bass thump (punch)
    function bassThump(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(90, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.18);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.connect(gain).connect(master);
      osc.start(now);
      osc.stop(now + 0.3);
    }

    // BOMBASTIC cha-ching: bass thump + bell stack chord + sparkle noise + reverb + harmonics
    function playChaChing(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;

      // Layer 1: bass thump
      bassThump(volume * 0.9);

      // Layer 2: bell-like chord stack (C E G C — major triad up an octave)
      const chord = [
        { freq: 1046.5,  start: 0.02, dur: 0.55, gain: 0.7 },  // C6
        { freq: 1318.51, start: 0.04, dur: 0.65, gain: 0.8 },  // E6
        { freq: 1567.98, start: 0.06, dur: 0.80, gain: 0.9 },  // G6
        { freq: 2093.0,  start: 0.10, dur: 1.10, gain: 0.6 },  // C7
        { freq: 2637.0,  start: 0.14, dur: 1.30, gain: 0.4 },  // E7 sparkle
        { freq: 3136.0,  start: 0.18, dur: 1.50, gain: 0.3 },  // G7 sparkle
      ];
      chord.forEach(n => {
        // Fundamental
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = n.freq;
        const t0 = now + n.start;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * n.gain, t0 + 0.005);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + n.dur);
        osc.connect(gain).connect(master);
        if (reverb) gain.connect(reverb.input);
        osc.start(t0);
        osc.stop(t0 + n.dur + 0.05);

        // Second harmonic (sine, lower amp) for shimmer
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = "sine";
        osc2.frequency.value = n.freq * 2;
        gain2.gain.setValueAtTime(0, t0);
        gain2.gain.linearRampToValueAtTime(volume * n.gain * 0.25, t0 + 0.005);
        gain2.gain.exponentialRampToValueAtTime(0.001, t0 + n.dur * 0.7);
        osc2.connect(gain2).connect(master);
        osc2.start(t0);
        osc2.stop(t0 + n.dur + 0.05);
      });

      // Layer 3: sparkle noise sweep (the "shimmer" sound)
      noiseBurst(0.4, 4000, 10000, volume * 0.15);
      noiseBurst(0.6, 2000, 6000, volume * 0.1);
    }

    // BIG coin ping with brightness + tiny chord follow
    function playCoin(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;

      // Main ping
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(1568, now); // G6
      osc.frequency.exponentialRampToValueAtTime(2349, now + 0.04); // D7
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(volume, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      osc.connect(gain).connect(master);
      if (reverb) gain.connect(reverb.input);
      osc.start(now);
      osc.stop(now + 0.4);

      // Follow-up fifth (tiny shimmer)
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = "sine";
      osc2.frequency.value = 3136; // G7
      gain2.gain.setValueAtTime(0, now + 0.06);
      gain2.gain.linearRampToValueAtTime(volume * 0.4, now + 0.07);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc2.connect(gain2).connect(master);
      osc2.start(now + 0.06);
      osc2.stop(now + 0.55);
    }

    // BOMBASTIC sad: bass drop + descending sawtooth chord
    function playSad(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const master = makeMasterChain();
      const now = ctx.currentTime;
      // Three voices descending in a minor chord
      [
        { startF: 523, endF: 130, dur: 0.9, gain: 0.5 },  // C5 → C3
        { startF: 622, endF: 155, dur: 0.9, gain: 0.4 },  // Eb
        { startF: 392, endF: 98,  dur: 0.9, gain: 0.4 },  // G4 → G2
      ].forEach(v => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(v.startF, now);
        osc.frequency.exponentialRampToValueAtTime(v.endF, now + v.dur);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(volume * v.gain, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, now + v.dur);
        osc.connect(gain).connect(master);
        osc.start(now);
        osc.stop(now + v.dur + 0.05);
      });
    }

    // Screen shake on huge wins
    function screenShake(intensity, durationMs) {
      const root = document.body;
      const start = performance.now();
      function tick(now) {
        const t = now - start;
        if (t >= durationMs) {
          root.style.transform = "";
          return;
        }
        const decay = 1 - t / durationMs;
        const x = (Math.random() - 0.5) * intensity * decay;
        const y = (Math.random() - 0.5) * intensity * decay;
        root.style.transform = `translate(${x}px,${y}px)`;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Draw a 5-point star
    function drawStar(c, size) {
      const spikes = 5;
      const outer = size;
      const inner = size * 0.5;
      c.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outer : inner;
        const a = (Math.PI / spikes) * i - Math.PI / 2;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
      }
      c.closePath();
      c.fill();
    }

    // BOMBASTIC confetti — multi-origin burst, mixed shapes, sparkle trails, screen shake
    function launchConfetti(count, colors) {
      const canvas = document.createElement("canvas");
      canvas.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9999";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const c = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;

      // Multi-origin: center + two bottom corners (firework cannon style)
      const origins = [
        { x: W / 2,       y: H / 2,       angleMin: -Math.PI, angleMax: 0, power: 1.0 },
        { x: 0,           y: H,           angleMin: -Math.PI * 0.75, angleMax: -Math.PI * 0.25, power: 1.2 },
        { x: W,           y: H,           angleMin: -Math.PI * 0.75, angleMax: -Math.PI * 0.25, power: 1.2 },
      ];

      const shapes = ["rect", "circle", "star", "ribbon"];
      const parts = [];
      for (let i = 0; i < count; i++) {
        const origin = origins[i % origins.length];
        const angle = origin.angleMin + Math.random() * (origin.angleMax - origin.angleMin);
        const speed = (8 + Math.random() * 14) * origin.power;
        parts.push({
          x: origin.x + (Math.random() - 0.5) * 40,
          y: origin.y + (Math.random() - 0.5) * 40,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          g: 0.28 + Math.random() * 0.12,
          drag: 0.985 + Math.random() * 0.01,
          size: 5 + Math.random() * 9,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * Math.PI * 2,
          vrot: (Math.random() - 0.5) * 0.4,
          shape: shapes[Math.floor(Math.random() * shapes.length)],
          flutter: Math.random() * Math.PI * 2,
          flutterSpeed: 0.1 + Math.random() * 0.15,
          life: 0,
          maxLife: 250 + Math.random() * 100,
        });
      }

      // Sparkle particles (smaller, glowing, longer fade)
      const sparkles = [];
      const sparkleCount = Math.floor(count * 0.4);
      for (let i = 0; i < sparkleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        sparkles.push({
          x: W / 2 + (Math.random() - 0.5) * 100,
          y: H / 2 + (Math.random() - 0.5) * 100,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 3,
          g: 0.05,
          drag: 0.96,
          size: 1.5 + Math.random() * 2.5,
          color: "#fffbe6",
          life: 0,
          maxLife: 60 + Math.random() * 40,
        });
      }

      let raf;
      function frame() {
        c.clearRect(0, 0, W, H);
        let alive = 0;

        // Confetti
        for (const p of parts) {
          p.vy += p.g;
          p.vx *= p.drag;
          p.vy *= p.drag;
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vrot;
          p.flutter += p.flutterSpeed;
          p.life++;
          if (p.y < H + 50 && p.life < p.maxLife) {
            alive++;
            c.save();
            c.translate(p.x, p.y);
            c.rotate(p.rot);
            // Flutter scale: simulate paper tumbling in air
            const flutterScale = Math.abs(Math.cos(p.flutter));
            c.scale(flutterScale + 0.3, 1);
            c.fillStyle = p.color;
            const fade = 1 - p.life / p.maxLife;
            c.globalAlpha = Math.min(1, fade * 1.5);
            if (p.shape === "rect") {
              c.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
            } else if (p.shape === "circle") {
              c.beginPath();
              c.arc(0, 0, p.size / 2, 0, Math.PI * 2);
              c.fill();
            } else if (p.shape === "star") {
              drawStar(c, p.size * 0.6);
            } else if (p.shape === "ribbon") {
              c.fillRect(-p.size / 2, -p.size / 8, p.size * 1.5, p.size / 4);
            }
            c.restore();
          }
        }

        // Sparkles
        for (const s of sparkles) {
          s.vy += s.g;
          s.vx *= s.drag;
          s.vy *= s.drag;
          s.x += s.vx;
          s.y += s.vy;
          s.life++;
          if (s.life < s.maxLife) {
            alive++;
            const fade = 1 - s.life / s.maxLife;
            c.save();
            c.globalAlpha = fade;
            c.fillStyle = s.color;
            c.shadowBlur = 12;
            c.shadowColor = "#fde047";
            c.beginPath();
            c.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            c.fill();
            c.restore();
          }
        }

        if (alive > 0) {
          raf = requestAnimationFrame(frame);
        } else {
          cancelAnimationFrame(raf);
          canvas.remove();
        }
      }
      frame();
    }

    // Flash whole screen briefly (refunds)
    function flashScreen(color) {
      const overlay = document.createElement("div");
      overlay.style.cssText = `position:fixed;inset:0;background:${color};opacity:0.4;pointer-events:none;z-index:9998;transition:opacity 0.6s ease-out`;
      document.body.appendChild(overlay);
      requestAnimationFrame(() => { overlay.style.opacity = "0"; });
      setTimeout(() => overlay.remove(), 700);
    }

    // Toast in top-right
    function showToast(msg, color) {
      const t = document.createElement("div");
      t.style.cssText = `position:fixed;top:20px;right:20px;background:${color};color:#000;padding:14px 18px;border-radius:10px;font-weight:700;font-size:15px;box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:10000;transform:translateX(120%);transition:transform 0.35s cubic-bezier(0.2,0.9,0.3,1.2)`;
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => { t.style.transform = "translateX(0)"; });
      setTimeout(() => {
        t.style.transform = "translateX(120%)";
        setTimeout(() => t.remove(), 400);
      }, 3500);
    }

    // Animated $ amount fly from center → KPI region
    function flyAmount(amount, color) {
      const el = document.createElement("div");
      el.textContent = `+$${amount.toFixed(2)}`;
      el.style.cssText = `position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.6);color:${color};font-weight:800;font-size:64px;text-shadow:0 4px 20px rgba(0,0,0,0.6);pointer-events:none;z-index:10001;transition:transform 1.2s cubic-bezier(0.4,0,0.2,1),opacity 1.2s ease-out;opacity:1`;
      document.body.appendChild(el);
      requestAnimationFrame(() => {
        el.style.transform = "translate(-50%,-50%) scale(1.4)";
        setTimeout(() => {
          // Fly up to KPI area
          el.style.transform = "translate(-50%,-300px) scale(0.4)";
          el.style.opacity = "0";
        }, 400);
      });
      setTimeout(() => el.remove(), 1700);
    }

    function fireReward(tx) {
      if (document.hidden) {
        // Tab not focused — fire confetti/toast anyway, audio will queue silently if needed
      }
      const type = tx.transaction_type;
      const price = Number(tx.price || 0);
      const app = tx.app_name || "Unknown";

      if (type === "new_subscription" || type === "trial_to_paid" || type === "one_time_purchase") {
        // Conversion reward tiered by $amount only (not by type):
        //   tier 1: < $10        — small celebration
        //   tier 2: $10 – $60    — medium celebration
        //   tier 3: > $60        — HUGE celebration
        const tier = price > 60 ? 3 : price >= 10 ? 2 : 1;
        const confettiCount = tier === 3 ? 350 : tier === 2 ? 200 : 120;
        const vol = Math.min(0.55, 0.2 + tier * 0.12);
        if (soundEnabled) playChaChing(vol);
        launchConfetti(confettiCount, [
          "#4ade80","#22c55e","#16a34a","#86efac","#bbf7d0",
          "#fde047","#facc15","#eab308","#fef08a",
          "#ffffff","#fff7ed"
        ]);
        flyAmount(price, "#4ade80");
        showToast(`💰 ${app} • $${price.toFixed(2)}`, "#4ade80");
      } else if (type === "renewal") {
        if (soundEnabled) playCoin(0.3);
        launchConfetti(70, ["#a855f7","#c084fc","#d8b4fe","#e9d5ff","#fde047","#ffffff"]);
        flyAmount(price, "#c084fc");
        showToast(`🔁 ${app} renewal • $${price.toFixed(2)}`, "#c084fc");
      } else if (type === "refund") {
        if (soundEnabled) {
          noiseBurst(0.5, 4000, 10000, 0.3);
          noiseBurst(0.7, 2000, 6000, 0.2);
        }
        flashScreen("#dc2626");
        showToast(`💸 ${app} refund • -$${price.toFixed(2)}`, "#fca5a5");
      }
    }

      function applyOpen() {
        body.style.display = open ? "flex" : "none";
        chevron.textContent = open ? "▾" : "▸";
      }
      applyOpen();
      panel.querySelector("#testerHeader").onclick = () => {
        open = !open;
        localStorage.setItem("testerOpen", open ? "1" : "0");
        applyOpen();
      };

      panel.querySelectorAll("button[data-act]").forEach(b => {
        b.onclick = () => {
          const act = b.dataset.act;
          const price = Number(b.dataset.price);
          const fakeApp = "TestApp";
          let type;
          if (act === "conv") type = "new_subscription";
          else if (act === "t2p") type = "trial_to_paid";
          else if (act === "renewal") type = "renewal";
          else if (act === "refund") type = "refund";
          fireReward({ transaction_type: type, price, app_name: fakeApp });
        };
      });
      panel.querySelectorAll("button[data-snd]").forEach(b => {
        b.onclick = () => {
          getAudioCtx();
          const s = b.dataset.snd;
          if (s === "chaching") playChaChing(0.4);
          else if (s === "coin") playCoin(0.3);
          else if (s === "sad") playSad(0.4);
          else if (s === "chord") playCashChord(0.4);
          else if (s === "kalimba") playKalimba(0.4);
          else if (s === "mega") playMegaWin(0.5);
          else if (s === "bass") bassThump(0.6);
          else if (s === "sparkle") { noiseBurst(0.5, 4000, 10000, 0.3); noiseBurst(0.7, 2000, 6000, 0.2); }
        };
      });
      panel.querySelectorAll("button[data-vis]").forEach(b => {
        b.onclick = () => {
          const v = b.dataset.vis;
          if (v === "confetti-heavy") launchConfetti(240, ["#4ade80","#22c55e","#fde047","#facc15"]);
          else if (v === "confetti-light") launchConfetti(25, ["#a855f7","#c084fc"]);
          else if (v === "flash-green") flashScreen("#16a34a");
          else if (v === "flash-red") flashScreen("#dc2626");
          else if (v === "fly-amount") flyAmount(50, "#4ade80");
        };
      });
    }

    // Alt sound variants (so you can A/B in tester)
    function playCashChord(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      // Major chord arpeggio: C5 E5 G5 C6
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = f;
        const t0 = now + i * 0.05;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * 0.6, t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.6);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.65);
      });
    }

    function playMegaWin(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      // Full cha-ching + ascending arpeggio over the top
      playChaChing(volume);
      const master = makeMasterChain();
      const reverb = getReverb();
      const now = ctx.currentTime;
      // C major arpeggio sweeping up
      const notes = [261.63, 329.63, 392, 523.25, 659.25, 783.99, 1046.5];
      notes.forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = f;
        const t0 = now + 0.25 + i * 0.08;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * 0.5, t0 + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.4);
        osc.connect(gain).connect(master);
        if (reverb) gain.connect(reverb.input);
        osc.start(t0);
        osc.stop(t0 + 0.45);
      });
    }

    function playKalimba(volume) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      // Pentatonic plink
      [880, 1318.51, 1760].forEach((f, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = f;
        const t0 = now + i * 0.07;
        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(volume * 0.5, t0 + 0.003);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.35);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.4);
      });
    }

    // Tester panel hidden by default — append ?test=1 to the URL to show it.
    if (new URLSearchParams(location.search).has("test")) installTesterPanel();
  </script>
</body>
</html>
